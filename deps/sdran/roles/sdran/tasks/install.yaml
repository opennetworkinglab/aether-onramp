---

# kubernetes.core modules used later in this role require the python
# `kubernetes` client library, which is NOT pulled in by a stock apt
# install of ansible on Ubuntu. Install it up-front. `airgapped.enabled`
# gates update_cache so airgapped hosts don't try to reach unreachable
# archives; when unset, the default of false preserves current online
# behaviour.
- name: install kubernetes.core python prerequisite (python3-kubernetes)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: "{{ not (airgapped.enabled | default(false) | bool) }}"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: remove /tmp/sdran-values.yaml
  file:
    path: "/tmp/sdran-values.yaml"
    state: absent
  when: inventory_hostname in groups['master_nodes']

- name: copy sdran-values.yaml to /tmp/sdran-values.yaml
  template:
    src: roles/sdran/templates/sdran-values.yaml
    dest: "/tmp/sdran-values.yaml"
  when: inventory_hostname in groups['master_nodes']

- name: update sdran helm dependencies
  command:
    argv:
      - helm
      - dep
      - up
      - "{{ sdran.sdran.helm.chart_ref }}"
  when: inventory_hostname in groups['master_nodes'] and sdran.sdran.helm.local_charts

- name: deploy sdran from {{ sdran.sdran.helm.chart_ref }}
  kubernetes.core.helm:
    update_repo_cache: true
    name: sd-ran
    release_namespace: sdran
    create_namespace: true
    chart_ref: "{{ sdran.sdran.helm.chart_ref }}"
    chart_version: "{{ sdran.sdran.helm.chart_version }}"
    values_files:
      - /tmp/sdran-values.yaml
    wait: true
    force: true
  when: inventory_hostname in groups['master_nodes']
