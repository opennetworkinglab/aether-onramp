---

# kubernetes.core modules used later in this role require the python
# `kubernetes` client library, which is NOT pulled in by a stock apt
# install of ansible on Ubuntu. Install it up-front. `airgapped.enabled`
# gates update_cache so airgapped hosts don't try to reach unreachable
# archives; when unset, the default of false preserves current online
# behaviour.
- name: install kubernetes.core python prerequisite (python3-kubernetes)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: "{{ not (airgapped.enabled | default(false) | bool) }}"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: add atomix chart repo
  kubernetes.core.helm_repository:
    name: atomix
    repo_url: "https://atomix.github.io/charts.atomix.io"
  when: inventory_hostname in groups['master_nodes']

- name: remove /tmp/sdran-platform-values.yaml
  file:
    path: "/tmp/sdran-platform-values.yaml"
    state: absent
  when: inventory_hostname in groups['master_nodes']

- name: copy sdran-platform-values.yaml to /tmp/sdran-platform-values.yaml
  template:
    src: roles/platform/templates/sdran-platform-values.yaml
    dest: "/tmp/sdran-platform-values.yaml"
  when: inventory_hostname in groups['master_nodes']

- name: apply local-path provisioner manifest
  command:
    argv:
      - kubectl
      - apply
      - -f
      - "https://raw.githubusercontent.com/rancher/local-path-provisioner/{{ sdran.platform.store.lpp.version }}/deploy/local-path-storage.yaml"
      - --wait=true
  when: inventory_hostname in groups['master_nodes']

- name: patch local-path storage class as default
  command:
    argv:
      - kubectl
      - patch
      - storageclass
      - local-path
      - -p
      - '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  when: inventory_hostname in groups['master_nodes']

- name: deploy atomix from {{ sdran.platform.atomix.helm.chart_ref }}
  kubernetes.core.helm:
    update_repo_cache: true
    name: atomix
    release_namespace: kube-system
    create_namespace: true
    chart_ref: "{{ sdran.platform.atomix.helm.chart_ref }}"
    chart_version: "{{ sdran.platform.atomix.helm.chart_version }}"
    values_files:
      - /tmp/sdran-platform-values.yaml
    wait: true
    force: true
  when: inventory_hostname in groups['master_nodes']

- name: deploy onos-operator from {{ sdran.platform.onosproject.helm.chart_ref }}
  kubernetes.core.helm:
    update_repo_cache: true
    name: onos-operator
    release_namespace: kube-system
    create_namespace: true
    chart_ref: "{{ sdran.platform.onosproject.helm.chart_ref }}"
    chart_version: "{{ sdran.platform.onosproject.helm.chart_version }}"
    values_files:
      - /tmp/sdran-platform-values.yaml
    wait: true
    force: true
  when: inventory_hostname in groups['master_nodes']
