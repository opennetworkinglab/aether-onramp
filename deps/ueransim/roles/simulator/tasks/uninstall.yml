---
- name: remove UERANSIM container
  community.docker.docker_container:
    name: "{{ ueransim.docker.container.name }}"
    state: absent
  ignore_errors: yes
  become: true
  when: inventory_hostname in groups['ueransim_nodes']

- name: remove UERANSIM config directory
  file:
    path: /tmp/ueransim
    state: absent
  ignore_errors: yes
  become: true
  when: inventory_hostname in groups['ueransim_nodes']

- name: remove {{ ueransim.docker.container.image }} image
  community.docker.docker_image:
    name: "{{ ueransim.docker.container.image }}"
    state: absent
    force_absent: true
  ignore_errors: yes
  become: true
  when: inventory_hostname in groups['ueransim_nodes']

- set_fact:
    subnet: "{{ core.upf.access_subnet | regex_replace('[0-9]+/24', '0/24') }}"
  when: inventory_hostname in groups['ueransim_nodes']

- name: remove static route for upf traffic on ueransim node
  command:
    argv:
      - ip
      - route
      - del
      - "{{ subnet }}"
      - via
      - "{{ core.amf.ip }}"
  when: (inventory_hostname in groups['ueransim_nodes']) and (inventory_hostname not in groups['master_nodes']) and core.upf.multihop_gnb == false
  become: true
  ignore_errors: yes
