---

- name: check if servers and config server length are equal
  fail:
    msg: "Number of ueransim nodes and servers in config file are not equal"
  when: ueransim.servers|length != groups['ueransim_nodes']|length

- name: validate UERANSIM Docker network mode
  ansible.builtin.assert:
    that:
      - ueransim.docker.network.name == 'host'
    fail_msg: "UERANSIM currently requires Docker host networking so uesimtun0 is visible on the host."
  when: inventory_hostname in groups['ueransim_nodes']

- name: create UERANSIM config directory
  file:
    path: /tmp/ueransim
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['ueransim_nodes']
  become: true

- name: copy gNb config files to ueransim host
  template:
    src: "{{ ROOT_DIR }}/{{ ueransim.servers[server_index | int].gnb }}"
    dest: /tmp/ueransim/custom-gnb.yaml
  vars:
    server_index: "{{ groups['ueransim_nodes'].index(inventory_hostname) }}"
  when: inventory_hostname in groups['ueransim_nodes']
  become: true

- name: copy UE config files to ueransim host
  template:
    src: "{{ ROOT_DIR }}/{{ ueransim.servers[server_index | int].ue }}"
    dest: /tmp/ueransim/custom-ue.yaml
  vars:
    server_index: "{{ groups['ueransim_nodes'].index(inventory_hostname) }}"
  when: inventory_hostname in groups['ueransim_nodes']
  become: true

- name: remove existing UERANSIM container
  community.docker.docker_container:
    name: "{{ ueransim.docker.container.name }}"
    state: absent
  when: inventory_hostname in groups['ueransim_nodes']
  become: true

- name: create UERANSIM container
  community.docker.docker_container:
    name: "{{ ueransim.docker.container.name }}"
    image: "{{ ueransim.docker.container.image }}"
    network_mode: "{{ ueransim.docker.network.name }}"
    volumes:
      - /tmp/ueransim:/opt/ueransim/config
    privileged: true
    state: started
    detach: true
    command: sleep infinity
  when: inventory_hostname in groups['ueransim_nodes']
  become: true

- name: Run gNB
  community.docker.docker_container_exec:
    container: "{{ ueransim.docker.container.name }}"
    detach: true
    argv:
      - nr-gnb
      - -c
      - /opt/ueransim/config/custom-gnb.yaml
  when: "inventory_hostname in groups['ueransim_nodes']"
  become: true

- pause:
    seconds: 5

- name: Run UE
  community.docker.docker_container_exec:
    container: "{{ ueransim.docker.container.name }}"
    detach: true
    argv:
      - nr-ue
      - -c
      - /opt/ueransim/config/custom-ue.yaml
  when: "inventory_hostname in groups['ueransim_nodes']"
  become: true

- pause:
    seconds: 5

- name: Get UE IP address
  command:
    argv:
      - ip
      - -o
      - -4
      - addr
      - show
      - uesimtun0
  register: ue_ip_result
  retries: 5
  delay: 2
  until:
    - ue_ip_result.rc == 0
    - (ue_ip_result.stdout | trim) != ''
  changed_when: false
  when: "inventory_hostname in groups['ueransim_nodes']"

- set_fact:
    ue_ip: "{{ ue_ip_result.stdout | regex_replace('^.* inet ([^/ ]+).*$','\\1') }}"
  when: "inventory_hostname in groups['ueransim_nodes']"

- debug:
    var: ue_ip
  when: inventory_hostname in groups['ueransim_nodes']

- set_fact:
    ping_target: "{{ core.upf.core_subnet | regex_replace('(/.*$)', '') }}"
  when: "inventory_hostname in groups['ueransim_nodes']"

- name: Run ping command for connectivity
  community.docker.docker_container_exec:
    container: "{{ ueransim.docker.container.name }}"
    argv:
      - nr-binder
      - "{{ ue_ip }}"
      - ping
      - -c
      - '5'
      - "{{ ping_target }}"
  register: ue_output
  when: "inventory_hostname in groups['ueransim_nodes']"
  become: true

- debug:
    var: ue_output.stdout_lines
  when: "inventory_hostname in groups['ueransim_nodes']"
