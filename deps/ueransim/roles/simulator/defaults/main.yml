ueransim:
  version: v3.2.7
  docker:
    container:
      image: aetherproject/ueransim:rel-0.7.0
      name: ueransim
    network:
      name: host

  gnb:
    ip: "172.20.0.2"

  servers:
    0:
      gnb: "config/custom-gnb.yaml"
      ue: "config/custom-ue.yaml"
core:
  upf:
    core_subnet: "192.168.250.1/24"
    multihop_gnb: false
  amf:
    ip: "172.16.248.6"
