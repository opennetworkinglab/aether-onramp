# Airgap behaviour for `apt: update_cache` tasks. See vars/main.yml
# for full documentation.
airgapped:
  enabled: false                 # set true to skip `apt update_cache` (offline / mirror-only sites)

core:
  upf:
    access_subnet: "192.168.252.1/24"
    core_subnet: "192.168.250.1/24"
    multihop_gnb: false
  amf:
    ip: "172.31.3.101"

ueransim:
  version: v3.2.7
  docker:
    container:
      image: aetherproject/ueransim:rel-0.7.0
      name: ueransim
    network:
      name: host
  gnb:
    ip: "172.20.0.2"
  servers:
    0:
      gnb: "config/custom-gnb.yaml"
      ue: "config/custom-ue.yaml"
