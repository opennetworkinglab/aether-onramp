---

- name: check if servers and config server length are equal
  fail:
    msg: "Mismatch in number of servers and ocudu nodes: {{ ocudu.servers|length }} vs {{ groups['ocudu_nodes']|length }}"
  when: ocudu.servers|length != groups['ocudu_nodes']|length

- name: delete {{ ocudu.docker.container.ue_image }} container
  community.docker.docker_container:
    name: "rfsim5g-nr-ue"
    state: absent
  when: inventory_hostname in groups['ocudu_nodes']
  become: true

- name: remove /tmp/ue_zmq.conf
  file:
    path: "/tmp/ue_zmq.conf"
    state: absent
  when: inventory_hostname in groups['ocudu_nodes']
  become: true

- name: remove {{ ocudu.docker.container.ue_image }} image
  community.docker.docker_image:
    name: "{{ ocudu.docker.container.ue_image }}"
    state: absent
    force_absent: true
  when: inventory_hostname in groups['ocudu_nodes']
  become: true
