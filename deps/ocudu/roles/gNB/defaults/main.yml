ocudu:
  docker:
    container:
      gnb_image: aetherproject/ocudu:rel-0.7.0
    network:
      name: host
    preflight:
      enabled: true
      min_cpus: 4
      # Tiny image used only to read `nproc` inside Docker. The airgap
      # bundle tool packages this dependency automatically; override
      # only if you want to point at an image already on the host.
      probe_image: "ghcr.io/omec-project/pod-init:rel-1.2.2"
  simulation: true

core:
  amf:
    ip: "172.16.248.6"
