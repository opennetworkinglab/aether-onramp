---

- name: check if servers and config server length are equal
  fail:
    msg: "Mismatch in number of servers and ocudu nodes: {{ ocudu.servers|length }} vs {{ groups['ocudu_nodes']|length }}"
  when: ocudu.servers|length != groups['ocudu_nodes']|length

- name: Preflight | Docker CPU availability for O-CU/DU gNB
  ansible.builtin.include_role:
    name: preflight
    tasks_from: docker_cpu
  vars:
    preflight_label: "O-CU/DU gNB"
    preflight_min_cpus: "{{ ocudu.docker.preflight.min_cpus }}"
    preflight_probe_image: "{{ ocudu.docker.preflight.probe_image }}"
    preflight_enabled: "{{ ocudu.docker.preflight.enabled }}"
  when: inventory_hostname in groups['ocudu_nodes']

# prep Ubuntu to support OCUDU gNB in DPDK-mode
- name: set net.core.wmem_max to 24912805
  ansible.posix.sysctl:
    name: net.core.wmem_max
    value: '24912805'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['ocudu_nodes']
  become: true

- name: ensure {{ ocudu.docker.container.gnb_image }} image is present
  # In airgap mode the image is loaded into Docker by the bundle's
  # dockerimages step; `source: local` reuses that without
  # contacting a registry. Online installs keep the network pull
  # so operators can refresh tags out-of-band.
  community.docker.docker_image:
    name: "{{ ocudu.docker.container.gnb_image }}"
    source: "{{ 'local' if airgapped.enabled | default(false) | bool else 'pull' }}"
  when: inventory_hostname in groups['ocudu_nodes']
  become: true

- name: remove /tmp/gnb_config.yaml
  file:
    path: "/tmp/gnb_config.yaml"
    state: absent
  when: inventory_hostname in groups['ocudu_nodes']
  become: true

- name : copy gnb config file to /tmp/gnb_config.yaml
  template:
    src: "{{ ocudu.servers[server_index | int].gnb_conf }}"
    dest: /tmp/gnb_config.yaml
  vars:
    server_index: "{{ groups['ocudu_nodes'].index(inventory_hostname) }}"
    gnb_ip: "{{ ocudu.servers[server_index | int].gnb_ip }}"
    gnb_id: "{{ (groups['ocudu_nodes'].index(inventory_hostname) | int) + 1000 }}"
    enable_e2_agent: "{{ (ocudu.servers[server_index | int].e2_agent.enable | default(false)) | bool | string | lower }}"
  when: inventory_hostname in groups['ocudu_nodes']
  become: true

- name: create {{ ocudu.docker.container.gnb_image }} containers
  community.docker.docker_container:
    name: ocudu-gnb
    image: "{{ ocudu.docker.container.gnb_image }}"
    networks:
      - name: "{{ ocudu.docker.network.name }}"
    volumes:
      - /tmp/gnb_config.yaml:/opt/gnb_config.yaml
      - /dev/hugepages:/dev/hugepages
    devices:
      - /dev/vfio:/dev/vfio
    privileged: true
    restart_policy: unless-stopped
    state: started
    detach: true
    interactive: true
    tty: true
    command: "gnb -c /opt/gnb_config.yaml"
  when: inventory_hostname in groups['ocudu_nodes']
  become: true
