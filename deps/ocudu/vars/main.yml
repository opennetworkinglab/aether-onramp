# Airgap behaviour for `apt: update_cache` tasks. See vars/main.yml
# for full documentation.
airgapped:
  enabled: false                 # set true to skip `apt update_cache` (offline / mirror-only sites)

ocudu:
  docker:
    container:
      gnb_image: aetherproject/ocudu:rel-0.8.2
      ue_image: aetherproject/srsran-ue:rel-0.8.2
    network:
      name: host
  simulation: true
  servers:
    0:
      gnb_ip: "10.76.28.115"             # Host interface used for the gNB (N2/N3)
      gnb_conf: gnb_zmq.yaml             # gNB config template; use gnb_dpdk_benetel.yaml for DPDK+OFH
      ue_conf: ue_zmq.conf               # deps/ocudu/roles/uEsimulator/templates/
      dpdk:
        enabled: false                   # set true to enable DPDK fronthaul (Benetel O-RU) on this OCUDU node
        hugepages: 2                     # number of 1 GB hugepages to pre-allocate on this host
        pf_iface: ""                     # Fronthaul PF interface used to create VF 0 on the OCUDU host
        du_mac_addr: ""                  # Optional VF 0 MAC override; auto-discovered if left empty
        vf_bdf: ""                       # Optional VF 0 PCI BDF override; auto-discovered if left empty
        ru_mac_addr: "70:b3:d5:e1:5e:7e" # Benetel RU fronthaul port MAC
        isolated_cpus: "3-23"            # CPUs isolated for DPDK/gNB (isolcpus, cpuset, eal_args)

core:
  upf:
    access_subnet: "192.168.252.1/24"
    multihop_gnb: false
  amf:
    ip: "10.76.28.113"
