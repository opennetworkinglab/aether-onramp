oai:
  docker:
    container:
      gnb_image: oaisoftwarealliance/oai-gnb:2026.w10
    network:
      name: public_net
    preflight:
      enabled: true
      min_cpus: 4
      # Tiny image used only to read `nproc` inside Docker. The airgap
      # bundle tool packages this dependency automatically; override
      # only if you want to point at an image already on the host.
      probe_image: "busybox:latest"
  simulation: true
  servers:
    0:
      gnb_conf: roles/gNb/templates/gnb.sa.band78.fr1.106PRB.usrpb210.conf
      gnb_ip: "172.20.0.2"

core:
  amf:
    ip: "172.16.248.6"
