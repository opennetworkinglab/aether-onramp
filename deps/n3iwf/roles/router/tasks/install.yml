---

- name: check if servers and config server length are equal
  fail:
    msg: "Mismatch in number of servers and n3iwf nodes: {{ n3iwf.servers|length }} vs {{ groups['n3iwf_nodes']|length }}"
  when: n3iwf.servers|length != groups['n3iwf_nodes']|length

- name: set net.ipv4.conf.all.arp_filter to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['n3iwf_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_ignore to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['n3iwf_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_announce to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['n3iwf_nodes']
  become: true

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['n3iwf_nodes']
  become: true

- name: configure static route for upf traffic on n3iwf node
  command:
    argv:
      - ip
      - route
      - replace
      - "{{ core.upf.access_subnet | regex_replace('[0-9]+/24', '0/24') }}"
      - via
      - "{{ core.amf.ip }}"
  when: (inventory_hostname in groups['n3iwf_nodes']) and (inventory_hostname not in groups['master_nodes']) and core.upf.multihop_gnb == false
  become: true
  ignore_errors: yes
