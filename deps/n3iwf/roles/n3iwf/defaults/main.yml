n3iwf:
  docker:
    image: ghcr.io/omec-project/5gc-n3iwf:rel-1.1.1
    network:
      name: public_net
    preflight:
      enabled: true
      min_cpus: 2
      # In airgapped installs, mirror this image or override to one already
      # available on the host.
      probe_image: "busybox:latest"
  servers:
    0:
      conf_file: roles/n3iwf/templates/n3iwf-default.yaml

core:
  amf:
    ip: "172.16.248.6"
