---

# prep Ubuntu to support RKE2-for-Aether
- name: set fs.file-max to 2097152
  ansible.posix.sysctl:
    name: fs.file-max
    value: '2097152'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set fs.inotify.max_user_watches to 524288
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: '524288'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set fs.inotify.max_user_instances to 512
  ansible.posix.sysctl:
    name: fs.inotify.max_user_instances
    value: '512'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

# install RKE2-for-Aether
- set_fact:
    script_dir: /tmp/rke2

- name: check for installed rke2 binary
  stat:
    path: /usr/local/bin/rke2
  register: rke2_binary
  when: inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])
  become: true

- name: detect installed rke2 version
  command: /usr/local/bin/rke2 --version
  register: rke2_installed_version
  changed_when: false
  when:
    - inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])
    - rke2_binary.stat.exists
    - rke2_binary.stat.executable
  become: true

- name: build RKE2 installer environment
  set_fact:
    rke2_install_env: >-
      {{
        proxy_env | combine(
          (k8s.rke2.version is search('\\+rke2r'))
          | ternary(
              {'INSTALL_RKE2_VERSION': k8s.rke2.version},
              {'INSTALL_RKE2_CHANNEL': k8s.rke2.version}
            )
        )
      }}
    rke2_install_needed: >-
      {{
        not (rke2_binary.stat.exists | default(false) and rke2_binary.stat.executable | default(false))
        or (
          (k8s.rke2.version is search('\\+rke2r'))
          and (((rke2_installed_version.stdout_lines[0] | default('')) | regex_search('v[^ ]+') | default('', true)) != k8s.rke2.version)
        )
        or (k8s.rke2.version is not search('\\+rke2r'))
      }}
  when: inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])

- name: remove {{ script_dir }}
  file:
    path: "{{ script_dir }}"
    state: absent
  when:
    - inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])
    - rke2_install_needed

- name: create {{ script_dir }}
  file:
    path: "{{ script_dir }}"
    state: directory
  when:
    - inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])
    - rke2_install_needed

- name: download rke2
  get_url:
    url: https://get.rke2.io
    validate_certs: false
    dest: "{{ script_dir }}/install.sh"
    mode: "a+x"
  when:
    - inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])
    - rke2_install_needed

- name: create /etc/rancher/rke2
  file:
    path: "/etc/rancher/rke2"
    state: directory
  when: inventory_hostname in (groups['master_nodes'] + groups['worker_nodes'])
  become: true

- name: install rke2 on masters
  command:
    argv:
      - "{{ script_dir }}/install.sh"
  environment: "{{ rke2_install_env | combine({'INSTALL_RKE2_SKIP_ENABLE': 'true', 'INSTALL_RKE2_SKIP_START': 'true'}) }}"
  register: rke2_server_install
  when:
    - inventory_hostname in groups['master_nodes']
    - rke2_install_needed
  become: true

- name: enable rke2-server on masters
  systemd:
    name: rke2-server
    enabled: true
  when: inventory_hostname in groups['master_nodes']
  become: true

# TODO: fix multi-master issue (tls-san)
- name: check for existing /etc/rancher/rke2/config.yaml
  stat:
    path: /etc/rancher/rke2/config.yaml
  register: rke2_existing_config
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy master-config.yaml to /etc/rancher/rke2/config.yaml
  template:
    src: "{{ ROOT_DIR }}/{{ k8s.rke2.config.params_file.master }}"
    dest: /etc/rancher/rke2/config.yaml
  register: rke2_server_config
  when:
    - inventory_hostname in groups['master_nodes']
    - not (rke2_existing_config.stat.exists and (k8s.rke2.config.preserve_existing | default(true)))
  become: true

- name: configure proxy for rke2-server
  blockinfile:
    path: /etc/default/rke2-server
    create: true
    owner: root
    group: root
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED PROXY BLOCK"
    block: |
      HTTP_PROXY={{ proxy.http_proxy | quote }}
      HTTPS_PROXY={{ proxy.https_proxy | quote }}
      NO_PROXY={{ proxy.no_proxy | quote }}
  register: rke2_server_proxy_present
  when:
    - inventory_hostname in groups['master_nodes']
    - (proxy is defined) and (proxy.enabled | default(false))
  become: true

- name: remove proxy for rke2-server when disabled
  blockinfile:
    path: /etc/default/rke2-server
    marker: "# {mark} ANSIBLE MANAGED PROXY BLOCK"
    state: absent
  register: rke2_server_proxy_absent
  when:
    - inventory_hostname in groups['master_nodes']
    - (proxy is not defined) or not (proxy.enabled | default(false))
  failed_when: false
  become: true

- name: start rke2-server on masters
  systemd:
    name: rke2-server
    state: started
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: restart rke2-server after configuration change
  systemd:
    name: rke2-server
    state: restarted
  when:
    - inventory_hostname in groups['master_nodes']
    - (rke2_server_install is defined and rke2_server_install is changed) or
      (rke2_server_config is defined and rke2_server_config is changed) or
      (rke2_server_proxy_present is defined and rke2_server_proxy_present is changed) or
      (rke2_server_proxy_absent is defined and rke2_server_proxy_absent is changed)
  become: true

- name: copy kubectl
  copy:
    src: /var/lib/rancher/rke2/bin/kubectl
    dest: /usr/local/bin/kubectl
    mode: "a+x"
    remote_src: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: wait for the Kubernetes API to respond
  command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - get
      - --raw=/readyz
  register: rke2_api_ready
  retries: 60
  delay: 5
  until: rke2_api_ready.rc == 0
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: read system hostname
  command: hostname
  register: rke2_system_hostname
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- block:
    - name: read rke2 config
      slurp:
        path: /etc/rancher/rke2/config.yaml
      register: rke2_config_raw
      changed_when: false
      become: true

    - name: parse rke2 config
      set_fact:
        rke2_config_parsed: "{{ (rke2_config_raw.content | b64decode | from_yaml) | default({}, true) }}"
  rescue:
    - name: fall back when rke2 config cannot be parsed
      set_fact:
        rke2_config_parsed: {}
  when: inventory_hostname in groups['master_nodes']

- name: resolve expected node name
  set_fact:
    rke2_expected_node_name: >-
      {{
        rke2_config_parsed.get('node-name')
        if (rke2_config_parsed.get('node-name') is string and (rke2_config_parsed.get('node-name') | trim) != '')
        else ((rke2_system_hostname.stdout | default('') | trim) or inventory_hostname)
      }}
  when: inventory_hostname in groups['master_nodes']

- name: wait for this master node object to be registered
  command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - get
      - node
      - "{{ rke2_expected_node_name }}"
      - -o
      - name
  register: rke2_current_node
  retries: 60
  delay: 5
  until: rke2_current_node.rc == 0 and (rke2_current_node.stdout | trim) != ''
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: wait for the master node(s) to get ready
  command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - wait
      - nodes
      - --for=condition=Ready
      - --all
      - --timeout=300s
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: detect kube-system deployments
  command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - -n
      - kube-system
      - get
      - deployment
      - -o
      - name
  register: kube_system_deployments
  retries: 12
  delay: 10
  until: kube_system_deployments.stdout | trim != ''
  failed_when: false
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: fail if kube-system deployments never appeared
  fail:
    msg: kube-system deployments did not appear before the retry window expired
  when:
    - inventory_hostname in groups['master_nodes']
    - kube_system_deployments.stdout | trim == ''

- name: wait for kube-system deployments to become available
  command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - wait
      - deployment
      - -n
      - kube-system
      - --for=condition=available
      - --all
      - --timeout=300s
  changed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - kube_system_deployments.stdout | trim != ''
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: install rke2 agent on workers
  command:
    argv:
      - "{{ script_dir }}/install.sh"
  environment: "{{ rke2_install_env | combine({'INSTALL_RKE2_TYPE': 'agent', 'INSTALL_RKE2_SKIP_ENABLE': 'true', 'INSTALL_RKE2_SKIP_START': 'true'}) }}"
  register: rke2_agent_install
  when:
    - inventory_hostname in groups['worker_nodes']
    - rke2_install_needed
  become: true

- name: enable rke2-agent on workers
  systemd:
    name: rke2-agent
    enabled: true
  when: inventory_hostname in groups['worker_nodes']
  become: true

- name: check for existing /etc/rancher/rke2/config.yaml on workers
  stat:
    path: /etc/rancher/rke2/config.yaml
  register: rke2_existing_worker_config
  when: inventory_hostname in groups['worker_nodes']
  become: true

- name: copy worker-config.yaml to /etc/rancher/rke2/config.yaml
  template:
    src: "{{ ROOT_DIR }}/{{ k8s.rke2.config.params_file.worker }}"
    dest: /etc/rancher/rke2/config.yaml
  register: rke2_agent_config
  when:
    - inventory_hostname in groups['worker_nodes']
    - not (rke2_existing_worker_config.stat.exists and (k8s.rke2.config.preserve_existing | default(true)))
  become: true

- name: configure proxy for rke2-agent
  blockinfile:
    path: /etc/default/rke2-agent
    create: true
    owner: root
    group: root
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED PROXY BLOCK"
    block: |
      HTTP_PROXY={{ proxy.http_proxy | quote }}
      HTTPS_PROXY={{ proxy.https_proxy | quote }}
      NO_PROXY={{ proxy.no_proxy | quote }}
  register: rke2_agent_proxy_present
  when:
    - inventory_hostname in groups['worker_nodes']
    - (proxy is defined) and (proxy.enabled | default(false))
  become: true

- name: remove proxy for rke2-agent when disabled
  blockinfile:
    path: /etc/default/rke2-agent
    marker: "# {mark} ANSIBLE MANAGED PROXY BLOCK"
    state: absent
  register: rke2_agent_proxy_absent
  when:
    - inventory_hostname in groups['worker_nodes']
    - (proxy is not defined) or not (proxy.enabled | default(false))
  failed_when: false
  become: true

- name: start rke2-agent on workers (sequentially)
  systemd:
    name: rke2-agent
    state: started
  throttle: 1
  when: inventory_hostname in groups['worker_nodes']
  become: true

- name: restart rke2-agent after configuration change
  systemd:
    name: rke2-agent
    state: restarted
  throttle: 1
  when:
    - inventory_hostname in groups['worker_nodes']
    - (rke2_agent_install is defined and rke2_agent_install is changed) or
      (rke2_agent_config is defined and rke2_agent_config is changed) or
      (rke2_agent_proxy_present is defined and rke2_agent_proxy_present is changed) or
      (rke2_agent_proxy_absent is defined and rke2_agent_proxy_absent is changed)
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['worker_nodes']
  become: true

- name: create {{ ansible_env.HOME }}/.kube
  file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
  when: inventory_hostname in groups['master_nodes']

- name: copy /etc/rancher/rke2/rke2.yaml {{ ansible_env.HOME }}/.kube/config
  copy:
    src: /etc/rancher/rke2/rke2.yaml
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: yes
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: Replace 127.0.0.1 if needed
  replace:
    path: "{{ ansible_env.HOME }}/.kube/config"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ hostvars[groups['master_nodes'][0]]['ansible_host'] }}:6443"
  when:
    - inventory_hostname in groups['master_nodes']
    - hostvars[groups['master_nodes'][0]]['ansible_host'] is defined
    - hostvars[groups['master_nodes'][0]]['ansible_host'] != '127.0.0.1'

- name: change {{ ansible_env.HOME }}/.kube ownership
  file:
    path: "{{ ansible_env.HOME }}/.kube"
    owner: "{{ ansible_user }}"
    recurse: true
  when: inventory_hostname in groups['master_nodes']
  become: true
