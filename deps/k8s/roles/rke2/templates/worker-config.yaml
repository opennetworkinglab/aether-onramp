{% set local_hosts = [None, '', 'localhost', '127.0.0.1', '::1'] %}
{% set master_name = groups['master_nodes'][0] %}
{% set master = hostvars[master_name] %}
{% set master_host = master.get('ansible_host') %}
{% set join_host = (((master.get('ansible_default_ipv4', {})['address']) | mandatory('master ansible_default_ipv4.address is required to set worker join_host when master ansible_host is empty/localhost')) if master_host in local_hosts else master_host) %}
{% set node_host = ansible_host | default('', true) %}
server: https://{{ join_host }}:{{ k8s.rke2.config.port }}
token: {{ k8s.rke2.config.token }}
node-name: {{ inventory_hostname }}
node-ip: {{ ((((ansible_default_ipv4 | default({}))['address']) | mandatory('ansible_default_ipv4.address is required to set node-ip when ansible_host is empty/localhost')) if node_host in local_hosts else node_host) | quote }}
cni: multus,canal
cluster-cidr: 10.42.0.0/16
service-cidr: 10.43.0.0/16
kubelet-arg:
- --allowed-unsafe-sysctls=net.*
kube-proxy-arg:
- --metrics-bind-address=0.0.0.0:10249
