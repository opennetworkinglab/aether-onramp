# Airgap behaviour for `apt: update_cache` tasks. See vars/main.yml
# for full documentation.
airgapped:
  enabled: false                 # set true to skip `apt update_cache` (offline / mirror-only sites)

core:
  standalone: true
  data_iface: ens18
  values_file: "roles/core/templates/radio-4g-values.yaml"
  ran_subnet: "172.20.0.0/16" # set it to empty to get subnet from 'data_iface'

  helm:
    chart_ref: aether/sd-core
    chart_version: 0.12.6
