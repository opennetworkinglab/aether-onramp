# Airgap behaviour for `apt: update_cache` tasks. See vars/main.yml
# for full documentation.
airgapped:
  enabled: false                 # set true to skip `apt update_cache` (offline / mirror-only sites)

srsran:
  docker:
    container:
      gnb_image: aetherproject/srsran-gnb:rel-0.7.0
      ue_image: aetherproject/srsran-ue:rel-0.7.0
    network:
      name: host
  simulation: true
  servers:
    0:
      gnb_ip: "10.76.28.115"            # Host interface used for the gNB
      gnb_conf: roles/gNB/templates/gnb_zmq.yaml
      ue_conf: roles/uEsimulator/templates/ue_zmq.conf

core:
  upf:
    access_subnet: "192.168.252.1/24"
    multihop_gnb: false
  amf:
    ip: "172.16.248.6"
