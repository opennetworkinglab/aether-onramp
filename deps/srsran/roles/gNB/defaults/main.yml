srsran:
  docker:
    container:
      gnb_image: aetherproject/srsran-gnb:rel-0.7.0
    network:
      name: public_net
    preflight:
      enabled: true
      min_cpus: 4
      # Tiny image used only to read `nproc` inside Docker. The airgap
      # bundle tool packages this dependency automatically; override
      # only if you want to point at an image already on the host.
      probe_image: "busybox:latest"
  simulation: true

core:
  amf:
    ip: "172.16.248.6"
