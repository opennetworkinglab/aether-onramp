---

# Resolve `core.data_iface` from the default-route interface when it
# is unset or left at one of the stock defaults. See the router
# role's install.yml for the full rationale.
- name: derive core.data_iface from default-route interface when unset
  ansible.builtin.set_fact:
    core: "{{ core | combine({'data_iface': ansible_default_ipv4.interface}) }}"
  when:
    - inventory_hostname in groups['master_nodes']
    - ansible_default_ipv4.interface is defined
    - core.data_iface is not defined or core.data_iface in ['', 'data']

- name: validate core.data_iface is set and exists on this host
  ansible.builtin.fail:
    msg: >-
      core.data_iface (={{ core.data_iface | default('<unset>') | to_json }}) is
      not a valid network interface on this host. Either it was left
      at a placeholder and no IPv4 default route was available to
      derive from, or the configured value does not match any
      interface in ansible_interfaces ({{ ansible_interfaces | join(', ') }}).
      Set core.data_iface in vars/main.yml to the data-plane
      interface name on the target node.
  when:
    - inventory_hostname in groups['master_nodes']
    - (core.data_iface is not defined)
      or (core.data_iface in ['', 'data'])
      or (core.data_iface not in (ansible_interfaces | default([])))

- name: check configured VF resources for additional UPFs
  block:
    - name: Get number of configured VFs for interface {{ core.data_iface }}
      command:
        argv:
          - ip
          - -d
          - link
          - show
          - "{{ core.data_iface }}"
      register: vf_status
      changed_when: false
      failed_when: false

    - debug:
         var=vf_status.stdout

    - name: verify the required VF resources are configured on {{ core.data_iface }}
      ansible.builtin.assert:
        that:
          - (vf_status.stdout | regex_findall('(?m)^\s+vf\s+\d+') | length) >= 2

  when: inventory_hostname in groups['master_nodes'] and core.upf.mode == "dpdk"

- name: find {{ core.data_iface }}'s subnet for RAN
  command:
    argv:
      - ip
      - -o
      - route
      - show
      - dev
      - "{{ core.data_iface }}"
  register: result
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: verify {{ core.data_iface }}'s subnet can be derived for RAN
  ansible.builtin.assert:
    that:
      - result.rc == 0
      - (result.stdout_lines | default([]) | select('search', ' proto kernel ') | list | length) > 0
    fail_msg: >-
      Unable to derive ran_subnet from interface {{ core.data_iface }}.
      Ensure core.data_iface is valid or set core.ran_subnet explicitly.
  when:
    - inventory_hostname in groups['master_nodes']
    - core.ran_subnet == ''

- set_fact:
    ran_subnet: >-
      {{
        (
          result.stdout_lines
          | default([])
          | select('search', ' proto kernel ')
          | map('regex_search', '^[^ ]+')
          | list
          | first
          | default('')
        ) if (core.ran_subnet == '') else core.ran_subnet
      }}
  when: inventory_hostname in groups['master_nodes']

- name: validate ran_subnet is in valid CIDR format
  ansible.builtin.assert:
    that:
      - ran_subnet is defined
      - ran_subnet | length > 0
      - ran_subnet is match('^((25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])/[0-9]{1,2}$')
      - (ran_subnet | split('/') | last | int) >= 8
      - (ran_subnet | split('/') | last | int) <= 30
      - >-
        ((
          (ran_subnet.split('/')[0].split('.')[0] | int) * 16777216 +
          (ran_subnet.split('/')[0].split('.')[1] | int) * 65536 +
          (ran_subnet.split('/')[0].split('.')[2] | int) * 256 +
          (ran_subnet.split('/')[0].split('.')[3] | int)
        ) % (2 ** (32 - (ran_subnet.split('/')[1] | int)))) == 0
    fail_msg: >-
      Invalid ran_subnet '{{ ran_subnet }}'. Must be in valid CIDR notation
      with no host bits set (e.g., 172.20.0.0/16) and prefix length between /8 and /30.
  when: inventory_hostname in groups['master_nodes']

- name: remove /tmp/upf-[].yaml
  file:
    path: "/tmp/upf-{{ item.key }}.yaml"
    state: absent
  with_dict: "{{ core.upf.additional_upfs}}"
  when: inventory_hostname in groups['master_nodes']

- name: copy config files to gnbsim host
  template:
    src: "{{ ROOT_DIR }}/{{ core.upf.values_file }}"
    dest: /tmp/upf-{{ item.key }}.yaml
  vars:
    ran_subnet: "{{ran_subnet}}"
    access_gw: "{{ core.upf.access_subnet[:-3] }}"
    core_gw: "{{ core.upf.core_subnet[:-3] }}"
    upf_access_ip: "{{ item.value.ip.access + '/24' }}"
    upf_core_ip: "{{ item.value.ip.core + '/24' }}"
    upf_ue_ip_pool: "{{ item.value.ue_ip_pool }}"
  with_dict: "{{ core.upf.additional_upfs}}"
  when: inventory_hostname in groups['master_nodes']

- name: update helm dependencies
  command:
    argv:
      - helm
      - dep
      - up
      - "{{ core.upf.helm.chart_ref }}"
  when: inventory_hostname in groups['master_nodes'] and core.upf.helm.local_charts

- set_fact:
    upf_helm_requires_repo_update: "{{ (not core.upf.helm.local_charts) and not (core.upf.helm.chart_ref is match('^oci://')) }}"
  when: inventory_hostname in groups['master_nodes']

- name: deploy upf
  kubernetes.core.helm:
    update_repo_cache: "{{ upf_helm_requires_repo_update }}"
    name: bess-upf
    release_namespace: aether-upf-{{ item.key }}
    create_namespace: true
    chart_ref: "{{ core.upf.helm.chart_ref }}"
    chart_version: "{{ core.upf.helm.chart_version if core.upf.helm.local_charts == false else omit }}"
    values_files:
      - /tmp/upf-{{item.key}}.yaml
    wait: true
    wait_timeout: "1m30s"
    force: true
  with_dict: "{{ core.upf.additional_upfs}}"
  when: inventory_hostname in groups['master_nodes']

- name: configure route for upf traffic on gnbsim node
  command:
    argv:
      - ip
      - route
      - add
      - "{{ item.value.ue_ip_pool }}"
      - via
      - "{{ item.value.ip.core }}"
  when: inventory_hostname in groups['master_nodes']
  with_dict: "{{ core.upf.additional_upfs}}"
  become: true
  # ignore_errors: yes

- name: configure NAT for upf traffic
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ item.value.ue_ip_pool }}"
    out_interface: "{{ core.data_iface }}"
    jump: MASQUERADE
  when: inventory_hostname in groups['master_nodes']
  with_dict: "{{ core.upf.additional_upfs}}"
  become: true
  # ignore_errors: yes
