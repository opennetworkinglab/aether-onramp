---

# Resolve `core.data_iface` from the default-route interface when it
# is unset or left at one of the stock defaults. See the router
# role's install.yml for the full rationale.
- name: derive core.data_iface from default-route interface when unset
  ansible.builtin.set_fact:
    core: "{{ core | combine({'data_iface': ansible_default_ipv4.interface}) }}"
  when:
    - inventory_hostname in groups['master_nodes']
    - ansible_default_ipv4.interface is defined
    - core.data_iface is not defined or core.data_iface in ['', 'data']

- name: validate core.data_iface is set and exists on this host
  ansible.builtin.fail:
    msg: >-
      core.data_iface (={{ core.data_iface | default('<unset>') | to_json }}) is
      not a valid network interface on this host. Either it was left
      at a placeholder and no IPv4 default route was available to
      derive from, or the configured value does not match any
      interface in ansible_interfaces ({{ ansible_interfaces | join(', ') }}).
      Set core.data_iface in vars/main.yml to the data-plane
      interface name on the target node.
  when:
    - inventory_hostname in groups['master_nodes']
    - (core.data_iface is not defined)
      or (core.data_iface in ['', 'data'])
      or (core.data_iface not in (ansible_interfaces | default([])))

# kubernetes.core modules (helm, k8s, k8s_info, etc.) require the python
# `kubernetes` client library, which is NOT pulled in by a stock apt
# install of ansible on Ubuntu. Install it up-front so later tasks in
# this role don't fail with "Failed to import the required Python
# library (kubernetes)". `airgapped.enabled` gates update_cache so
# airgapped hosts don't try to reach unreachable archives; when unset,
# the default of false preserves current online behaviour.
- name: install kubernetes.core python prerequisite (python3-kubernetes)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: "{{ not (airgapped.enabled | default(false) | bool) }}"
  when: inventory_hostname in groups['master_nodes']
  become: true

# Ensure ~/.kube/config exists for the ansible user so kubernetes.core
# tasks below find a valid config. The k8s role populates this on its
# own install path (see deps/k8s/roles/rke2/tasks/install.yml) — and
# also rewrites the server URL from 127.0.0.1 to the master's
# ansible_host, which matters on multi-node. We must not clobber that
# post-processing.
#
# Strategy: only act when ~/.kube/config is missing. When the k8s
# role has already run (full onramp flow) the file exists and the
# whole block is a no-op. When operators bring a pre-existing
# cluster and skip the k8s role, the file is absent and we probe
# /etc/rancher/{rke2,k3s}/*.yaml for a source to copy from.
#
# Operators can set `kubeconfig_source` in inventory vars to skip the
# probe; to force-reinstall, delete ~/.kube/config first.
- name: check for existing ansible-user kubeconfig
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.kube/config"
  register: _user_kubeconfig_stat
  when: inventory_hostname in groups['master_nodes']

- name: locate on-disk cluster kubeconfig
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /etc/rancher/rke2/rke2.yaml
    - /etc/rancher/k3s/k3s.yaml
  register: _kubeconfig_candidates
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_stat.stat.exists | default(false))
    - kubeconfig_source is not defined

- name: resolve kubeconfig_source to first existing candidate
  ansible.builtin.set_fact:
    kubeconfig_source: "{{ item.item }}"
  loop: "{{ _kubeconfig_candidates.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('') }}"
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_stat.stat.exists | default(false))
    - kubeconfig_source is not defined
    - item.stat.exists | default(false)

- name: ensure ~/.kube exists for ansible user
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: "0700"
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_stat.stat.exists | default(false))
    - kubeconfig_source is defined

- name: install cluster kubeconfig at ~/.kube/config
  ansible.builtin.copy:
    src: "{{ kubeconfig_source }}"
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: yes
    mode: "0600"
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_stat.stat.exists | default(false))
    - kubeconfig_source is defined
  become: true

- name: rewrite 127.0.0.1 in kubeconfig when master is remote
  ansible.builtin.replace:
    path: "{{ ansible_env.HOME }}/.kube/config"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ hostvars[groups['master_nodes'][0]]['ansible_host'] }}:6443"
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_stat.stat.exists | default(false))
    - kubeconfig_source is defined
    - hostvars[groups['master_nodes'][0]]['ansible_host'] is defined
    - hostvars[groups['master_nodes'][0]]['ansible_host'] != '127.0.0.1'
  # Required: the preceding `copy` ran with become: true and wrote
  # the file as root@0600. Without become here the replace would
  # hit permission denied on a non-root ansible_user.
  become: true

- name: set ~/.kube ownership
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    owner: "{{ ansible_user }}"
    recurse: true
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_stat.stat.exists | default(false))
    - kubeconfig_source is defined
  become: true

- name: verify ansible-user kubeconfig after bootstrap
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.kube/config"
  register: _user_kubeconfig_ready_stat
  when: inventory_hostname in groups['master_nodes']

- name: fail when ansible-user kubeconfig is still unavailable
  ansible.builtin.fail:
    msg: >-
      5GC core install requires a readable kubeconfig at
      {{ ansible_env.HOME }}/.kube/config for ansible_user {{ ansible_user }},
      but it is still missing or unreadable after the bootstrap step. Run the
      k8s provisioning flow first, or set kubeconfig_source to a valid cluster
      kubeconfig path on the target host.
  when:
    - inventory_hostname in groups['master_nodes']
    - not (_user_kubeconfig_ready_stat.stat.exists | default(false)) or not (_user_kubeconfig_ready_stat.stat.readable | default(false))

- name: check configured VF resources for built-in UPF
  block:
    - name: Get number of configured VFs for interface {{ core.data_iface }}
      command:
        argv:
          - ip
          - -d
          - link
          - show
          - "{{ core.data_iface }}"
      register: vf_status
      changed_when: false
      failed_when: false

    - debug:
        var: vf_status.stdout_lines

    - name: verify the required VF resources are configured on {{ core.data_iface }}
      ansible.builtin.assert:
        that:
          - (vf_status.stdout | regex_findall('(?m)^\s+vf\s+\d+') | length) >= 2

  when: inventory_hostname in groups['master_nodes'] and core.upf.mode == "dpdk"

- name: find {{ core.data_iface }}'s subnet for RAN
  command:
    argv:
      - ip
      - -o
      - route
      - show
      - dev
      - "{{ core.data_iface }}"
  register: result
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: verify {{ core.data_iface }}'s subnet can be derived for RAN
  ansible.builtin.assert:
    that:
      - result.rc == 0
      - (result.stdout_lines | default([]) | select('search', ' proto kernel ') | list | length) > 0
    fail_msg: >-
      Unable to derive ran_subnet from interface {{ core.data_iface }}.
      Ensure core.data_iface is valid or set core.ran_subnet explicitly.
  when:
    - inventory_hostname in groups['master_nodes']
    - core.ran_subnet == ''

- set_fact:
    ran_subnet: >-
      {{
        (
          result.stdout_lines
          | default([])
          | select('search', ' proto kernel ')
          | map('regex_search', '^[^ ]+')
          | list
          | first
          | default('')
        ) if (core.ran_subnet == '') else core.ran_subnet
      }}
    access_gw: "{{ core.upf.access_subnet[:-3] }}"
    access_ip: "{{ core.upf.default_upf.ip.access + '/24' }}"
    core_gw: "{{ core.upf.core_subnet[:-3] }}"
    core_ip: "{{ core.upf.default_upf.ip.core + '/24' }}"
  when: inventory_hostname in groups['master_nodes']

- name: validate ran_subnet is in valid CIDR format
  ansible.builtin.assert:
    that:
      - ran_subnet is defined
      - ran_subnet | length > 0
      - ran_subnet is match('^((25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])/[0-9]{1,2}$')
      - (ran_subnet | split('/') | last | int) >= 8
      - (ran_subnet | split('/') | last | int) <= 30
      - >-
        ((
          (ran_subnet.split('/')[0].split('.')[0] | int) * 16777216 +
          (ran_subnet.split('/')[0].split('.')[1] | int) * 65536 +
          (ran_subnet.split('/')[0].split('.')[2] | int) * 256 +
          (ran_subnet.split('/')[0].split('.')[3] | int)
        ) % (2 ** (32 - (ran_subnet.split('/')[1] | int)))) == 0
    fail_msg: >-
      Invalid ran_subnet '{{ ran_subnet }}'. Must be in valid CIDR notation
      with no host bits set (e.g., 172.20.0.0/16) and prefix length between /8 and /30.
  when: inventory_hostname in groups['master_nodes']

- debug:
    var: ran_subnet
  when: inventory_hostname in groups['master_nodes']

- name: remove /tmp/sdcore-5g-values.yaml
  file:
    path: "/tmp/sdcore-5g-values.yaml"
    state: absent
  when: inventory_hostname in groups['master_nodes']

- name: copy {{ core.values_file }} to /tmp/sdcore-5g-values.yaml
  template:
    src: "{{ ROOT_DIR }}/{{ core.values_file }}"
    dest: "/tmp/sdcore-5g-values.yaml"
  when: inventory_hostname in groups['master_nodes']

- set_fact:
    local_sd_core_chart_root: "{{ core.helm.chart_ref | regex_replace('^(.*)/.*$', '\\1')  }}"
    local_sd_core_chart_path: "/tmp/sdcore-helm-charts/{{ core.helm.chart_ref | regex_replace('^.*/(.*)$', '\\1') }}"
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- debug:
    var: local_sd_core_chart_root
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- set_fact:
    core_helm_requires_repo_update: "{{ (not core.helm.local_charts) and not (core.helm.chart_ref is match('^oci://')) }}"
  when: inventory_hostname in groups['master_nodes']

- name: copy local_charts to /tmp/sdcore-helm-charts
  # ansible.builtin.copy cannot exclude paths during recursive directory
  # copies, so package the chart tree on the controller while omitting the
  # local git metadata and then unarchive it on the target via the normal
  # Ansible transport. This preserves ansible_user ownership on the remote
  # host and avoids spending time traversing .git.
  block:
    - name: create local archive path for sd-core charts
      ansible.builtin.tempfile:
        state: file
        suffix: .tar.gz
      register: core_local_chart_archive
      delegate_to: localhost
      become: false
      run_once: true

    - name: archive local_charts without git metadata
      ansible.builtin.archive:
        path: "{{ local_sd_core_chart_root }}/"
        dest: "{{ core_local_chart_archive.path }}"
        format: gz
        exclude_path:
          - "{{ local_sd_core_chart_root }}/.git"
      delegate_to: localhost
      become: false
      run_once: true

    - name: publish local sd-core charts archive path
      ansible.builtin.set_fact:
        core_local_chart_archive_path: "{{ core_local_chart_archive.path }}"
      delegate_to: localhost
      delegate_facts: true
      become: false
      run_once: true

    - name: remove remote sd-core chart staging directory
      ansible.builtin.file:
        path: /tmp/sdcore-helm-charts
        state: absent

    - name: create remote sd-core chart staging directory
      ansible.builtin.file:
        path: /tmp/sdcore-helm-charts
        state: directory
        mode: "0755"

    - name: unpack local_charts to /tmp/sdcore-helm-charts
      ansible.builtin.unarchive:
        src: "{{ hostvars['localhost'].core_local_chart_archive_path }}"
        dest: /tmp/sdcore-helm-charts/

  always:
    - name: remove local sd-core charts archive
      ansible.builtin.file:
        path: "{{ core_local_chart_archive.path }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - core_local_chart_archive is defined
        - core_local_chart_archive.path is defined
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- debug:
    var: local_sd_core_chart_path
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- name: read local 5gc-cp Chart.yaml
  slurp:
    src: /tmp/sdcore-helm-charts/5g-control-plane/Chart.yaml
  register: core_cp_chart_yaml
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- name: derive local 5gc-cp chart dependency names
  set_fact:
    core_cp_dependency_names: >-
      {{
        ((core_cp_chart_yaml.content | b64decode | from_yaml).dependencies | default([]))
        | map(attribute='name')
        | list
      }}
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- name: check local 5gc-cp charts directory
  stat:
    path: /tmp/sdcore-helm-charts/5g-control-plane/charts
  register: core_cp_charts_dir
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

- name: check local 5gc-cp chart dependencies
  find:
    paths: /tmp/sdcore-helm-charts/5g-control-plane/charts
    patterns: "{{ item }}-*"
    recurse: false
  loop: "{{ core_cp_dependency_names }}"
  register: core_cp_chart_dependencies
  when:
    - inventory_hostname in groups['master_nodes']
    - core.helm.local_charts
    - core_cp_charts_dir.stat.exists
    - core_cp_dependency_names | length > 0

- name: require manual 5gc-cp helm dependency update when charts are missing
  fail:
    msg: >-
      Missing 5g-control-plane chart dependencies under
      /tmp/sdcore-helm-charts/5g-control-plane/charts. Run
      'helm dep up {{ local_sd_core_chart_root }}/5g-control-plane' before
      deploying with local SD-Core charts.
      Missing: {{ core_cp_chart_dependencies.results | default([]) | selectattr('matched', 'equalto', 0) | map(attribute='item') | join(', ') }}.
  when:
    - inventory_hostname in groups['master_nodes']
    - core.helm.local_charts
    - not core_cp_charts_dir.stat.exists or (core_cp_chart_dependencies.results | default([]) | selectattr('matched', 'equalto', 0) | list | length) > 0

- name: update aether 5gc helm dependencies
  command:
    argv:
      - helm
      - dep
      - up
      - "{{ local_sd_core_chart_path }}"
  when: inventory_hostname in groups['master_nodes'] and core.helm.local_charts

# TODO: add systems check to avoid issues (e.g., mongodb needing avx support)
- name: deploy aether 5gc
  block:
    - name: deploy aether 5gc
      kubernetes.core.helm:
        update_repo_cache: "{{ core_helm_requires_repo_update }}"
        name: sd-core
        release_namespace: aether-5gc
        create_namespace: true
        chart_ref: "{{ core.helm.chart_ref if core.helm.local_charts == false else local_sd_core_chart_path }}"
        chart_version: "{{ core.helm.chart_version if core.helm.local_charts == false else omit }}"
        values_files:
          - /tmp/sdcore-5g-values.yaml
        wait: true
        wait_timeout: "2m30s"
        force: true
      when: inventory_hostname in groups['master_nodes']

  rescue:
    # Intentionally non-fatal: when helm failed because the cluster is
    # unreachable or kubeconfig is missing, k8s_info will hit the same
    # error. Letting it abort the rescue would mean the loud-fail task
    # below never runs and operators see the k8s_info error instead of
    # the underlying helm failure. failed_when: false registers
    # pod_status in both the "empty namespace" and "API unreachable"
    # cases; `pod_status.resources | default([])` below normalises
    # both to an empty list so the loud-fail fires.
    - name: Get Pods Status
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: aether-5gc
      register: pod_status
      changed_when: false
      failed_when: false
      when: inventory_hostname in groups['master_nodes']

    # The restart loop below can only recover from "pods were created but
    # some are not Running". When pod_status.resources is empty the helm
    # deploy never produced any pods (typical when chart_ref is
    # unreachable, the cluster API is down, or kubeconfig is missing),
    # so there is nothing for the rescue to fix. Re-raise with the
    # original failure details so operators see the helm error directly
    # instead of hunting through earlier task output.
    # `pod_status.resources | length == 0` is true in two cases now
    # that k8s_info is non-fatal: the namespace genuinely has no
    # pods, OR k8s_info itself failed (cluster unreachable,
    # kubeconfig missing, RBAC denial). Both indicate "nothing to
    # recover" from this rescue's perspective; the surfaced
    # ansible_failed_result tells the operator which one.
    - name: fail loudly when helm deploy produced no pods to recover
      ansible.builtin.fail:
        msg: |-
          sd-core helm deploy failed and no pods were found in
          aether-5gc (the namespace is empty, or k8s_info could not
          query the cluster API) — nothing for the rescue to recover.

          Original failure in task '{{ ansible_failed_task.name | default('unknown', true) }}':
          {{ ansible_failed_result.msg | default('', true)
             | default(ansible_failed_result | default({}, true) | to_nice_yaml, true) }}
      when:
        - inventory_hostname in groups['master_nodes']
        - (pod_status.resources | default([])) | length == 0

    - name: restart Pods if not running
      kubernetes.core.k8s:
        api_version: v1
        kind: Pod
        namespace: aether-5gc
        name: "{{ item.metadata.name }}"
        state: absent
      loop: "{{ pod_status.resources | default([]) }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      register: pod_restart
      when:
        - inventory_hostname in groups['master_nodes']
        - (item.status.phase | default('')) != 'Running'
      ignore_errors: yes
  always:
    - pause:
        seconds: 60
