---

# TODO: running on master node for now (fix to run on multiple nodes)

# Path is shared with install.yml; declared up-front so the recovery
# slurp below and the later set_fact block use one source of truth.
- name: declare paths shared with install.yml
  ansible.builtin.set_fact:
    router_sysctl_backup_file: /var/lib/aether-5gc-router-sysctl-backup.conf

# Recover the install-time data_iface from the sysctl backup file.
# The backup was written by install.yml in the form
#     net/ipv4/conf/<install-time-iface>/forwarding=<original-value>
# Reading it back here guarantees uninstall targets the same
# interface install used, even if the host's default route has since
# moved to a different NIC. Operator overrides via vars/main.yml or
# inventory still win; the auto-derive below only fires if both the
# explicit override and the backup file are absent/unparseable.
# `become: true`: the backup file is written by install at mode 0600
# owned by root, so an unprivileged ansible_user can't slurp it.
- name: read sysctl backup file for install-time data_iface
  ansible.builtin.slurp:
    src: "{{ router_sysctl_backup_file }}"
  register: _router_sysctl_backup
  failed_when: false
  changed_when: false
  become: true
  when:
    - inventory_hostname in groups['master_nodes']
    - core.data_iface is not defined or core.data_iface in ['', 'data']

- name: recover core.data_iface from sysctl backup file
  ansible.builtin.set_fact:
    core: "{{ core | combine({'data_iface':
      _router_sysctl_backup.content | b64decode
        | regex_findall('(?m)^net/ipv4/conf/([^/]+)/forwarding=') | first }) }}"
  when:
    - inventory_hostname in groups['master_nodes']
    - core.data_iface is not defined or core.data_iface in ['', 'data']
    - _router_sysctl_backup.content is defined
    - (_router_sysctl_backup.content | b64decode) is regex('(?m)^net/ipv4/conf/[^/]+/forwarding=')

# Mirror the install-time auto-derive when neither an explicit
# operator value nor the backup-file recovery resolved the interface.
- name: derive core.data_iface from default-route interface when unset
  ansible.builtin.set_fact:
    core: "{{ core | combine({'data_iface': ansible_default_ipv4.interface}) }}"
  when:
    - inventory_hostname in groups['master_nodes']
    - ansible_default_ipv4.interface is defined
    - core.data_iface is not defined or core.data_iface in ['', 'data']

# Non-fatal in uninstall: cleanup is best-effort (most tasks below
# use `ignore_errors: yes`), so a hard failure here would block
# legitimate uninstall runs on hosts where the install-time interface
# is no longer present (renamed NIC, decommissioned hardware, etc.).
# Surface a warning instead — interface-dependent tasks downstream
# will fail individually under their existing ignore_errors and the
# rest of the cleanup still completes.
- name: warn when core.data_iface cannot be resolved on this host
  ansible.builtin.debug:
    msg: >-
      WARNING: core.data_iface (={{ core.data_iface | default('<unset>') | to_json }})
      is not a valid network interface on this host. Either it was
      left at a placeholder and no IPv4 default route was available
      to derive from, or the configured value does not match any
      interface in ansible_interfaces ({{ ansible_interfaces | join(', ') }}).
      Interface-specific cleanup steps may be skipped; re-run with
      `core.data_iface` set explicitly to fully clean up.
  when:
    - inventory_hostname in groups['master_nodes']
    - (core.data_iface is not defined)
      or (core.data_iface in ['', 'data'])
      or (core.data_iface not in (ansible_interfaces | default([])))

- set_fact:
    systemd_network_dir: /etc/systemd/network
    systemd_system_dir: /etc/systemd/system
    router_data_iface_forwarding_sysctl: net/ipv4/conf/{{ core.data_iface }}/forwarding
    router_data_iface_forwarding_backup_regexp: >-
      ^(net\.ipv4\.conf\.{{ core.data_iface | regex_escape }}\.forwarding|net/ipv4/conf/{{ core.data_iface | regex_escape }}/forwarding)=(.+)$

- name: stop 5gc-iptables.service
  systemd:
    name: 5gc-iptables.service
    state: stopped
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: disable 5gc-iptables.service
  systemd:
    name: 5gc-iptables.service
    enabled: false
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete {{ systemd_system_dir }}/5gc-iptables.service
  file:
    path: "{{ systemd_system_dir }}/5gc-iptables.service"
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete persistent 5gc iptables rules file
  file:
    path: /etc/iptables/5gc-rules.v4
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: "delete iptable rule: forward from {{ core.data_iface }} to access"
  iptables:
    chain: FORWARD
    in_interface: "{{ core.data_iface }}"
    out_interface: access
    jump: ACCEPT
    state: absent
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true
  ignore_errors: yes

- name: "delete iptable rule: forward from access to {{ core.data_iface }}"
  iptables:
    chain: FORWARD
    in_interface: access
    out_interface: "{{ core.data_iface }}"
    jump: ACCEPT
    state: absent
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true
  ignore_errors: yes

- name: "delete iptable rule: forward from {{ core.data_iface }} to core"
  iptables:
    chain: FORWARD
    in_interface: "{{ core.data_iface }}"
    out_interface: core
    jump: ACCEPT
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: "delete iptable rule: forward from core to {{ core.data_iface }}"
  iptables:
    chain: FORWARD
    in_interface: core
    out_interface: "{{ core.data_iface }}"
    jump: ACCEPT
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: stop aether-ue-nat.service
  systemd:
    name: aether-ue-nat.service
    state: stopped
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: disable aether-ue-nat.service
  systemd:
    name: aether-ue-nat.service
    enabled: false
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete {{ systemd_system_dir }}/aether-ue-nat.service
  file:
    path: "{{ systemd_system_dir }}/aether-ue-nat.service"
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: stop aether-5gc-macvlan.service
  systemd:
    name: aether-5gc-macvlan.service
    state: stopped
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: disable aether-5gc-macvlan.service
  systemd:
    name: aether-5gc-macvlan.service
    enabled: false
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete {{ systemd_system_dir }}/aether-5gc-macvlan.service
  file:
    path: "{{ systemd_system_dir }}/aether-5gc-macvlan.service"
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: check if systemd-networkd is active
  command:
    argv:
      - systemctl
      - is-active
      - systemd-networkd
  register: systemd_networkd_state
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: set whether systemd-networkd is active
  set_fact:
    systemd_networkd_active: "{{ (systemd_networkd_state.stdout | default('') | trim) == 'active' }}"
  when: inventory_hostname in groups['master_nodes']
  ignore_errors: yes

- name: read {{ core.data_iface }} networkctl status
  command:
    argv:
      - networkctl
      - status
      - "{{ core.data_iface }}"
  register: data_iface_networkctl_status
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: derive {{ core.data_iface }}'s active systemd-networkd file via networkctl
  set_fact:
    data_iface_network_file_networkctl: >-
      {{
        data_iface_networkctl_status.stdout_lines
        | default([])
        | select('match', '^\s*Network File:\s+.*\.network\s*$')
        | map('regex_replace', '^\s*Network File:\s+(.*\.network)\s*$', '\\1')
        | list
        | first
        | default('')
        | basename
      }}
  when:
    - inventory_hostname in groups['master_nodes']
  ignore_errors: yes

- name: find {{ core.data_iface }}'s systemd-networkd file by filename
  find:
    paths:
      - /etc/systemd/network
      - /run/systemd/network
      - /lib/systemd/network
      - /usr/lib/systemd/network
    patterns: "*{{ core.data_iface }}.network"
    recurse: false
    file_type: file
  register: data_iface_network_file_matches
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_file_networkctl | default('') | trim) == ''
  become: true
  ignore_errors: yes

- name: derive {{ core.data_iface }}'s systemd-networkd file by filename
  set_fact:
    data_iface_network_file_cmd: >-
      {{
        data_iface_network_file_matches.files
        | default([])
        | map(attribute='path')
        | map('basename')
        | sort
        | first
        | default('')
      }}
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_file_networkctl | default('') | trim) == ''
  ignore_errors: yes

- name: set {{ core.data_iface }}'s systemd-networkd filename
  set_fact:
    data_iface_network_filename: >-
      {{
        (data_iface_network_file_networkctl | default('') | trim)
        if (data_iface_network_file_networkctl | default('') | trim) != ''
        else (data_iface_network_file_cmd | default('') | trim)
      }}
  when:
    - inventory_hostname in groups['master_nodes']
    - systemd_networkd_active
  ignore_errors: yes

- name: set empty systemd-networkd filename when systemd-networkd is inactive
  set_fact:
    data_iface_network_filename: ''
  when:
    - inventory_hostname in groups['master_nodes']
    - not (systemd_networkd_active | default(false))
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan.conf
  file:
    path: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan.conf"
    state: absent
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_filename | default('') | trim) != ''
  become: true
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d if empty
  command:
    argv:
      - rmdir
      - "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d"
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_filename | default('') | trim) != ''
  become: true
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/20-aether-core.network
  file:
    path: "{{ systemd_network_dir }}/20-aether-core.network"
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/10-aether-core.netdev
  file:
    path: "{{ systemd_network_dir }}/10-aether-core.netdev"
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/20-aether-access.network
  file:
    path: "{{ systemd_network_dir }}/20-aether-access.network"
    state: absent
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true
  ignore_errors: yes

- name: delete  {{ systemd_network_dir }}/10-aether-access.netdev
  file:
    path: "{{ systemd_network_dir }}/10-aether-access.netdev"
    state: absent
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true
  ignore_errors: yes

# TODO: fix this hack (make a proper cleanup service)
- name: delete access macvlan interface
  command:
    argv:
      - ip
      - link
      - del
      - access
  register: delete_access_macvlan
  changed_when: delete_access_macvlan.rc == 0
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete core macvlan interface
  command:
    argv:
      - ip
      - link
      - del
      - core
  register: delete_core_macvlan
  changed_when: delete_core_macvlan.rc == 0
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: delete NAT masquerade rule for UE traffic
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ core.upf.default_upf.ue_ip_pool }}"
    out_interface: "{{ core.data_iface }}"
    jump: MASQUERADE
    state: absent
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: check for router sysctl backup file
  stat:
    path: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_stat
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: read router sysctl backup file
  slurp:
    src: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_content
  when:
    - inventory_hostname in groups['master_nodes']
    - router_sysctl_backup_stat.stat.exists
  become: true
  ignore_errors: yes

- name: extract saved router sysctl values
  set_fact:
    saved_net_ipv4_ip_forward: >-
      {{
        (router_sysctl_backup_content.content | default('') | b64decode)
        | regex_findall('(?m)^net\\.ipv4\\.ip_forward=(.+)$')
        | first
        | default('', true)
      }}
    saved_net_ipv4_conf_iface_forwarding: >-
      {{
        (router_sysctl_backup_content.content | default('') | b64decode)
        | regex_findall(router_data_iface_forwarding_backup_regexp, multiline=true)
        | first
        | default(['', ''], true)
        | last
      }}
  when: inventory_hostname in groups['master_nodes']
  ignore_errors: yes

- name: set net.ipv4.conf.all.arp_filter to 0
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '0'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: set net.ipv4.conf.all.arp_ignore to 0
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '0'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: set net.ipv4.conf.all.arp_announce to 0
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '0'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true
  ignore_errors: yes

- name: restore {{ router_data_iface_forwarding_sysctl }}
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    value: '{{ saved_net_ipv4_conf_iface_forwarding }}'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['master_nodes']
    - (saved_net_ipv4_conf_iface_forwarding | default('')) != ''
  become: true
  ignore_errors: yes

- name: remove {{ router_data_iface_forwarding_sysctl }} sysctl configuration
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    state: absent
    sysctl_set: false
    reload: true
  when:
    - inventory_hostname in groups['master_nodes']
    - (saved_net_ipv4_conf_iface_forwarding | default('')) == ''
  become: true
  ignore_errors: yes

- name: restore net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '{{ saved_net_ipv4_ip_forward }}'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['master_nodes']
    - (saved_net_ipv4_ip_forward | default('')) != ''
  become: true
  ignore_errors: yes

- name: remove net.ipv4.ip_forward sysctl configuration
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    state: absent
    sysctl_set: false
    reload: true
  when:
    - inventory_hostname in groups['master_nodes']
    - (saved_net_ipv4_ip_forward | default('')) == ''
  become: true
  ignore_errors: yes

- name: delete router sysctl backup file
  file:
    path: "{{ router_sysctl_backup_file }}"
    state: absent
  when:
    - inventory_hostname in groups['master_nodes']
    - router_sysctl_backup_stat.stat.exists
  become: true
  ignore_errors: yes
