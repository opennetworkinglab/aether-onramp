---

# TODO: running on master node for now (fix to run on multiple nodes)

- set_fact:
    systemd_network_dir: /etc/systemd/network
    systemd_system_dir: /etc/systemd/system
    router_sysctl_backup_file: /var/lib/aether-5gc-router-sysctl-backup.conf
    router_data_iface_forwarding_sysctl: net/ipv4/conf/{{ core.data_iface }}/forwarding
    router_data_iface_forwarding_backup_regexp: >-
      ^(net\.ipv4\.conf\.{{ core.data_iface | regex_escape }}\.forwarding|net/ipv4/conf/{{ core.data_iface | regex_escape }}/forwarding)=

- name: set net.ipv4.conf.all.arp_filter to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_ignore to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_announce to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: check for router sysctl backup file
  stat:
    path: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_stat
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: read router sysctl backup file
  slurp:
    src: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_content
  when:
    - inventory_hostname in groups['master_nodes']
    - router_sysctl_backup_stat.stat.exists
  become: true

- name: read current net.ipv4.ip_forward value
  command: sysctl -n net.ipv4.ip_forward
  register: original_net_ipv4_ip_forward
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: persist original net.ipv4.ip_forward value for uninstall
  lineinfile:
    path: "{{ router_sysctl_backup_file }}"
    create: true
    mode: '0600'
    line: "net.ipv4.ip_forward={{ original_net_ipv4_ip_forward.stdout | trim }}"
    regexp: '^net\.ipv4\.ip_forward='
  when:
    - inventory_hostname in groups['master_nodes']
    - original_net_ipv4_ip_forward is defined
    - not ((router_sysctl_backup_content.content | default('') | b64decode) is regex('(?m)^net\\.ipv4\\.ip_forward='))
  become: true

- name: set net.ipv4.ip_forward to 1
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: read current {{ router_data_iface_forwarding_sysctl }} value
  command:
    argv:
      - sysctl
      - -n
      - "{{ router_data_iface_forwarding_sysctl }}"
  register: original_net_ipv4_conf_iface_forwarding
  changed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: persist original {{ router_data_iface_forwarding_sysctl }} value for uninstall
  lineinfile:
    path: "{{ router_sysctl_backup_file }}"
    create: true
    mode: '0600'
    line: "{{ router_data_iface_forwarding_sysctl }}={{ original_net_ipv4_conf_iface_forwarding.stdout | trim }}"
    regexp: "{{ router_data_iface_forwarding_backup_regexp }}"
  when:
    - inventory_hostname in groups['master_nodes']
    - original_net_ipv4_conf_iface_forwarding is defined
    - not ((router_sysctl_backup_content.content | default('') | b64decode) is regex(router_data_iface_forwarding_backup_regexp, multiline=true))
  become: true

- name: set {{ router_data_iface_forwarding_sysctl }} to 1
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy 10-aether-access.netdev to {{ systemd_network_dir }}/10-aether-access.netdev
  template:
    src: roles/router/templates/10-aether-access.netdev
    dest: "{{ systemd_network_dir }}/10-aether-access.netdev"
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true

- name: copy 20-aether-access.network to {{ systemd_network_dir }}/20-aether-access.network
  template:
    src: roles/router/templates/20-aether-access.network
    dest: "{{ systemd_network_dir }}/20-aether-access.network"
  when: inventory_hostname in groups['master_nodes'] and core.upf.multihop_gnb == false
  become: true

- name: copy 10-aether-core.netdev to {{ systemd_network_dir }}/10-aether-core.netdev
  template:
    src: roles/router/templates/10-aether-core.netdev
    dest: "{{ systemd_network_dir }}/10-aether-core.netdev"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy 20-aether-core.network to {{ systemd_network_dir }}/20-aether-core.network
  template:
    src: roles/router/templates/20-aether-core.network
    dest: "{{ systemd_network_dir }}/20-aether-core.network"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: Disable GRO flag on the {{ core.data_iface }} interface
  command:
    argv:
      - ethtool
      - -K
      - "{{ core.data_iface }}"
      - gro
      - "off"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: check if systemd-networkd is active
  command:
    argv:
      - systemctl
      - is-active
      - systemd-networkd
  register: systemd_networkd_state
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: set whether systemd-networkd is active
  set_fact:
    systemd_networkd_active: "{{ (systemd_networkd_state.stdout | default('') | trim) == 'active' }}"
  when: inventory_hostname in groups['master_nodes']

- name: read {{ core.data_iface }} networkctl status
  command:
    argv:
      - networkctl
      - status
      - "{{ core.data_iface }}"
  register: data_iface_networkctl_status
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - systemd_networkd_active
  become: true

- name: derive {{ core.data_iface }}'s active systemd-networkd file via networkctl
  set_fact:
    data_iface_network_file_networkctl: >-
      {{
        data_iface_networkctl_status.stdout_lines
        | default([])
        | select('match', '^\s*Network File:\s+.*\.network\s*$')
        | map('regex_replace', '^\s*Network File:\s+(.*\.network)\s*$', '\\1')
        | list
        | first
        | default('')
        | basename
      }}
  when:
    - inventory_hostname in groups['master_nodes']
    - systemd_networkd_active

- name: find {{ core.data_iface }}'s systemd-networkd file by filename
  find:
    paths:
      - /etc/systemd/network
      - /run/systemd/network
      - /lib/systemd/network
      - /usr/lib/systemd/network
    patterns: "*{{ core.data_iface }}.network"
    recurse: false
    file_type: file
  register: data_iface_network_file_matches
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - systemd_networkd_active
    - (data_iface_network_file_networkctl | default('') | trim) == ''
  become: true

- name: derive {{ core.data_iface }}'s systemd-networkd file by filename
  set_fact:
    data_iface_network_file_cmd: >-
      {{
        data_iface_network_file_matches.files
        | default([])
        | map(attribute='path')
        | map('basename')
        | sort
        | first
        | default('')
      }}
  when:
    - inventory_hostname in groups['master_nodes']
    - systemd_networkd_active
    - (data_iface_network_file_networkctl | default('') | trim) == ''

- name: set {{ core.data_iface }}'s systemd-networkd filename
  set_fact:
    data_iface_network_filename: >-
      {{
        (data_iface_network_file_networkctl | default('') | trim)
        if (data_iface_network_file_networkctl | default('') | trim) != ''
        else (data_iface_network_file_cmd | default('') | trim)
      }}
  when:
    - inventory_hostname in groups['master_nodes']
    - systemd_networkd_active

- name: set empty systemd-networkd filename when systemd-networkd is inactive
  set_fact:
    data_iface_network_filename: ''
  when:
    - inventory_hostname in groups['master_nodes']
    - not (systemd_networkd_active | default(false))

- name: resolve {{ core.data_iface }}'s systemd-networkd file path
  find:
    paths:
      - /etc/systemd/network
      - /run/systemd/network
      - /lib/systemd/network
      - /usr/lib/systemd/network
    patterns: "{{ data_iface_network_filename }}"
    recurse: false
    file_type: file
  register: data_iface_network_path_matches
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_filename | default('') | trim) is match('.*\\.network$')
  become: true

- name: set {{ core.data_iface }}'s systemd-networkd file path
  set_fact:
    data_iface_network_path: >-
      {{
        data_iface_network_path_matches.files
        | default([])
        | map(attribute='path')
        | sort
        | first
        | default('')
      }}
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_filename | default('') | trim) is match('.*\\.network$')

- name: read {{ core.data_iface }}'s systemd-networkd file
  slurp:
    src: "{{ data_iface_network_path | trim }}"
  register: data_iface_network_file_content
  when:
    - inventory_hostname in groups['master_nodes']
    - (data_iface_network_path | default('') | trim) != ''
  become: true

- name: set whether {{ core.data_iface }} is managed by systemd-networkd
  set_fact:
    data_iface_networkd_managed: >-
      {{
        systemd_networkd_active
        and (data_iface_network_filename | default('') | trim) is match('.*\\.network$')
        and (
          (core.data_iface in (data_iface_network_filename | default('') | trim))
          or (
            (data_iface_network_file_content.content | default('') | b64decode)
            is regex('(?ms)^\\[Match\\][^[]*^Name\\s*=\\s*{{ core.data_iface | regex_escape }}\\s*$')
          )
        )
      }}
  when: inventory_hostname in groups['master_nodes']

- name: note direct macvlan fallback for {{ core.data_iface }}
  debug:
    msg: >-
      {{ core.data_iface }} is not managed by systemd-networkd. Falling back to direct macvlan interface setup.
  when:
    - inventory_hostname in groups['master_nodes']
    - not data_iface_networkd_managed

- name: create {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d
  file:
    path: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d"
    state: directory
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy macvlan.conf to {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan.conf
  template:
    src: roles/router/templates/macvlan.conf
    dest: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan.conf"
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy aether-5gc-macvlan.service to {{ systemd_system_dir }}/aether-5gc-macvlan.service
  template:
    src: roles/router/templates/aether-5gc-macvlan.service
    dest: "{{ systemd_system_dir }}/aether-5gc-macvlan.service"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy aether-ue-nat.service to {{ systemd_system_dir }}/aether-ue-nat.service
  template:
    src: roles/router/templates/aether-ue-nat.service
    dest: "{{ systemd_system_dir }}/aether-ue-nat.service"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: disable aether-5gc-macvlan.service when systemd-networkd manages {{ core.data_iface }}
  systemd:
    name: aether-5gc-macvlan.service
    enabled: false
    state: stopped
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: enable aether-5gc-macvlan.service for direct macvlan fallback
  systemd:
    name: aether-5gc-macvlan.service
    enabled: true
    state: restarted
  when:
    - inventory_hostname in groups['master_nodes']
    - not data_iface_networkd_managed
  become: true

- name: enable aether-ue-nat.service
  systemd:
    name: aether-ue-nat.service
    enabled: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: start aether-ue-nat.service
  systemd:
    name: aether-ue-nat.service
    state: started
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: restart systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
  when:
    - inventory_hostname in groups['master_nodes']
    - data_iface_networkd_managed
  become: true

- name: install iptables-persistent package
  apt:
    name: iptables-persistent
    state: present
    update_cache: "{{ not (airgapped.enabled | default(false) | bool) }}"
  when: inventory_hostname in groups['master_nodes']
  become: true
  environment: "{{ proxy_env | combine({'DEBIAN_FRONTEND': 'noninteractive'}) }}"

- name: create /etc/iptables directory
  file:
    path: /etc/iptables
    state: directory
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: deploy 5gc iptables rules configuration
  template:
    src: roles/router/templates/5gc-iptables-rules.v4
    dest: /etc/iptables/5gc-rules.v4
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: copy 5gc-iptables.service to {{ systemd_system_dir }}/5gc-iptables.service
  template:
    src: roles/router/templates/5gc-iptables.service
    dest: "{{ systemd_system_dir }}/5gc-iptables.service"
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: force systemd to reread configs for 5gc-iptables service
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: enable 5gc-iptables.service
  systemd:
    name: 5gc-iptables.service
    enabled: true
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: wait for core interface to be ready
  command: ip link show core
  register: core_interface_check
  changed_when: false
  failed_when: false
  retries: 15
  delay: 1
  until: core_interface_check.rc == 0
  when: inventory_hostname in groups['master_nodes']
  become: true

- name: wait for access interface to be ready
  command: ip link show access
  register: access_interface_check
  changed_when: false
  failed_when: false
  retries: 15
  delay: 1
  until: access_interface_check.rc == 0
  when:
    - inventory_hostname in groups['master_nodes']
    - not core.upf.multihop_gnb
  become: true

- name: start 5gc-iptables.service
  systemd:
    name: 5gc-iptables.service
    state: started
  when: inventory_hostname in groups['master_nodes']
  become: true
