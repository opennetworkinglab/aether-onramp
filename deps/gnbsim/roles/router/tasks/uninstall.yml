---

- name: declare paths shared with install.yml
  ansible.builtin.set_fact:
    router_sysctl_backup_file: /var/lib/gnbsim-router-sysctl-backup.conf

- name: read router sysctl backup file
  ansible.builtin.slurp:
    src: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_content
  failed_when: false
  changed_when: false
  become: true
  when: inventory_hostname in groups['gnbsim_nodes']

- name: recover gnbsim.router.data_iface from sysctl backup file
  ansible.builtin.set_fact:
    gnbsim: "{{ gnbsim | combine({'router': {'data_iface': (
        ((router_sysctl_backup_content.content | b64decode) | regex_findall('(?m)^net\\.ipv4\\.conf\\.(.+)\\.forwarding='))
        + ((router_sysctl_backup_content.content | b64decode) | regex_findall('(?m)^net/ipv4/conf/(.+)/forwarding='))
      ) | last | default('', true)}}, recursive=true) }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - gnbsim.router.data_iface is not defined or gnbsim.router.data_iface == ''
    - router_sysctl_backup_content.content is defined
    - (router_sysctl_backup_content.content | b64decode) is regex('(?m)^(net\\.ipv4\\.conf\\..+\\.forwarding=|net/ipv4/conf/.+/forwarding=)')

- name: derive gnbsim.router.data_iface from default-route interface when unset
  ansible.builtin.set_fact:
    gnbsim: "{{ gnbsim | combine({'router': {'data_iface': ansible_default_ipv4.interface}}, recursive=true) }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - gnbsim.router.data_iface is not defined or gnbsim.router.data_iface == ''

- name: warn when gnbsim.router.data_iface cannot be resolved on this host
  ansible.builtin.debug:
    msg: >-
      WARNING: gnbsim.router.data_iface (={{ gnbsim.router.data_iface | default('<unset>') | to_json }})
      is not a valid network interface on this host. Interface-specific cleanup
      steps may be skipped; re-run with `gnbsim.router.data_iface` set explicitly
      to fully clean up.
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (gnbsim.router.data_iface is not defined)
      or (gnbsim.router.data_iface == '')
      or (gnbsim.router.data_iface not in (ansible_interfaces | default([])))

- set_fact:
    systemd_network_dir: /etc/systemd/network
    systemd_system_dir: /etc/systemd/system
    gnbsim_router_state_dir: /var/lib/gnbsim-router
    gnbsim_default_uplink_forwarding_state_file: /var/lib/gnbsim-router/default-uplink-forwarding
    router_data_iface_forwarding_sysctl: "net.ipv4.conf.{{ gnbsim.router.data_iface }}.forwarding"
    router_data_iface_forwarding_backup_regexp: >-
      ^(net\.ipv4\.conf\.{{ gnbsim.router.data_iface | regex_escape }}\.forwarding|net/ipv4/conf/{{ gnbsim.router.data_iface | regex_escape }}/forwarding)=(.+)$

- name: stop gnbsim-macvlan.service
  systemd:
    name: gnbsim-macvlan.service
    state: stopped
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: stop gnbsim-iptables.service
  systemd:
    name: gnbsim-iptables.service
    state: stopped
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: disable gnbsim-iptables.service
  systemd:
    name: gnbsim-iptables.service
    enabled: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: delete /etc/systemd/system/gnbsim-iptables.service
  file:
    path: "{{ systemd_system_dir }}/gnbsim-iptables.service"
    state: absent
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: stop gnbsim-routes.service
  systemd:
    name: gnbsim-routes.service
    state: stopped
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: remove legacy master static routes as fallback
  command:
    argv:
      - /usr/sbin/ip
      - route
      - del
      - "{{ gnbsim.router.macvlan.subnet_prefix }}.{{ lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', item) }}.0/24"
      - via
      - "{{ hostvars[item]['ansible_default_ipv4']['address'] }}"
  loop: "{{ play_hosts | intersect(groups['gnbsim_nodes']) | difference(groups['master_nodes']) | list }}"
  when: inventory_hostname in groups['master_nodes']
  become: true
  failed_when: false

- name: remove legacy gnbsim static route as fallback
  command:
    argv:
      - /usr/sbin/ip
      - route
      - del
      - "{{ core.upf.access_subnet | regex_replace('[0-9]+/24', '0/24') }}"
      - via
      - "{{ core.amf.ip }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - inventory_hostname not in groups['master_nodes']
  become: true
  failed_when: false

- name: disable gnbsim-routes.service
  systemd:
    name: gnbsim-routes.service
    enabled: false
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: delete /etc/systemd/system/gnbsim-routes.service
  file:
    path: "{{ systemd_system_dir }}/gnbsim-routes.service"
    state: absent
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: force systemd to reread configs after removing gnbsim-routes.service
  systemd:
    daemon_reload: true
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: delete /usr/local/sbin/gnbsim-routes.sh
  file:
    path: /usr/local/sbin/gnbsim-routes.sh
    state: absent
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: disable gnbsim-macvlan.service
  systemd:
    name: gnbsim-macvlan.service
    enabled: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: delete /etc/systemd/system/gnbsim-macvlan.service
  file:
    path: "{{ systemd_system_dir }}/gnbsim-macvlan.service"
    state: absent
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: check if systemd-networkd is active
  command:
    argv:
      - systemctl
      - is-active
      - systemd-networkd
  register: systemd_networkd_state
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: set whether systemd-networkd is active
  set_fact:
    systemd_networkd_active: "{{ (systemd_networkd_state.stdout | default('') | trim) == 'active' }}"
  when: inventory_hostname in groups['gnbsim_nodes']
  ignore_errors: yes

- name: "remove iptable rule: forward from access to gnbaccess"
  iptables:
    chain: FORWARD
    in_interface: "access"
    out_interface: "gnbaccess"
    jump: ACCEPT
    state: absent
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: "remove iptable rule: forward from gnbaccess to access"
  iptables:
    chain: FORWARD
    in_interface: "gnbaccess"
    out_interface: "access"
    jump: ACCEPT
    state: absent
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname in groups['master_nodes'])
  become: true
  ignore_errors: yes

- name: "remove iptable rule: forward from {{ gnbsim.router.data_iface }} to gnbaccess"
  iptables:
    chain: FORWARD
    in_interface: "{{ gnbsim.router.data_iface }}"
    out_interface: "gnbaccess"
    jump: ACCEPT
    state: absent
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (gnbsim.router.data_iface | default('') | trim) != ''
  become: true
  ignore_errors: yes

- name: "delete iptable rule: forward from gnbaccess to {{ gnbsim.router.data_iface }}"
  iptables:
    chain: FORWARD
    in_interface: "gnbaccess"
    out_interface: "{{ gnbsim.router.data_iface }}"
    jump: ACCEPT
    state: absent
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (gnbsim.router.data_iface | default('') | trim) != ''
  become: true
  ignore_errors: yes

- name: check for saved default uplink forwarding state
  stat:
    path: "{{ gnbsim_default_uplink_forwarding_state_file }}"
  register: default_uplink_forwarding_state_file
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: read saved default uplink forwarding state
  slurp:
    src: "{{ gnbsim_default_uplink_forwarding_state_file }}"
  register: default_uplink_forwarding_state
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (default_uplink_forwarding_state_file.stat.exists | default(false))
  become: true
  ignore_errors: yes

- name: parse saved default uplink forwarding state
  set_fact:
    default_uplink_forwarding_state_data: "{{ default_uplink_forwarding_state.content | b64decode | from_yaml }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (default_uplink_forwarding_state_file.stat.exists | default(false))
    - default_uplink_forwarding_state is succeeded
    - default_uplink_forwarding_state.content is defined
  ignore_errors: yes

- name: restore saved default uplink forwarding state when default uplink differs
  ansible.posix.sysctl:
    name: net.ipv4.conf.{{ default_uplink_forwarding_state_data.interface }}.forwarding
    value: "{{ default_uplink_forwarding_state_data.forwarding }}"
    sysctl_set: true
    reload: true
  register: restore_default_uplink_forwarding_result
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (default_uplink_forwarding_state_file.stat.exists | default(false))
    - default_uplink_forwarding_state_data is defined
    - default_uplink_forwarding_state_data.interface is defined
    - (default_uplink_forwarding_state_data.interface | trim) != ''
    - default_uplink_forwarding_state_data.forwarding is defined
  become: true
  ignore_errors: yes

- name: delete saved default uplink forwarding state
  file:
    path: "{{ gnbsim_default_uplink_forwarding_state_file }}"
    state: absent
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (default_uplink_forwarding_state_file.stat.exists | default(false))
    - restore_default_uplink_forwarding_result is defined
    - not (restore_default_uplink_forwarding_result.skipped | default(false))
    - restore_default_uplink_forwarding_result is succeeded
  become: true
  ignore_errors: yes

- name: delete gnbsim router state directory if empty
  command:
    argv:
      - rmdir
      - "{{ gnbsim_router_state_dir }}"
  register: gnbsim_router_state_dir_removal
  changed_when: gnbsim_router_state_dir_removal.rc == 0
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - restore_default_uplink_forwarding_result is defined
    - not (restore_default_uplink_forwarding_result.skipped | default(false))
    - restore_default_uplink_forwarding_result is succeeded
  become: true

- name: delete persistent gnbsim iptables rules file
  file:
    path: /etc/iptables/gnbsim-rules.v4
    state: absent
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: read {{ gnbsim.router.data_iface }} networkctl status
  command:
    argv:
      - networkctl
      - status
      - "{{ gnbsim.router.data_iface }}"
  register: data_iface_networkctl_status
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
  become: true
  ignore_errors: yes

- name: derive {{ gnbsim.router.data_iface }}'s active systemd-networkd file via networkctl
  set_fact:
    data_iface_network_file_networkctl: >-
      {{
        data_iface_networkctl_status.stdout_lines
        | default([])
        | select('match', '^\s*Network File:\s+.*\.network\s*$')
        | map('regex_replace', '^\s*Network File:\s+(.*\.network)\s*$', '\\1')
        | list
        | first
        | default('')
        | basename
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
  ignore_errors: yes

- name: find {{ gnbsim.router.data_iface }}'s systemd-networkd file by filename
  find:
    paths:
      - /etc/systemd/network
      - /run/systemd/network
      - /lib/systemd/network
      - /usr/lib/systemd/network
    patterns: "*{{ gnbsim.router.data_iface }}.network"
    recurse: false
    file_type: file
  register: data_iface_network_file_matches
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_file_networkctl | default('') | trim) == ''
  become: true
  ignore_errors: yes

- name: derive {{ gnbsim.router.data_iface }}'s systemd-networkd file by filename
  set_fact:
    data_iface_network_file_cmd: >-
      {{
        data_iface_network_file_matches.files
        | default([])
        | map(attribute='path')
        | map('basename')
        | sort
        | first
        | default('')
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_file_networkctl | default('') | trim) == ''
  ignore_errors: yes

- name: set {{ gnbsim.router.data_iface }}'s systemd-networkd filename
  set_fact:
    data_iface_network_filename: >-
      {{
        (data_iface_network_file_networkctl | default('') | trim)
        if (data_iface_network_file_networkctl | default('') | trim) != ''
        else (data_iface_network_file_cmd | default('') | trim)
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
  ignore_errors: yes

- name: set empty systemd-networkd filename when systemd-networkd is inactive
  set_fact:
    data_iface_network_filename: ''
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not (systemd_networkd_active | default(false))
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan-gnbsim.conf
  file:
    path: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan-gnbsim.conf"
    state: absent
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_filename | default('') | trim) != ''
  become: true

- name: delete {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d if empty
  command:
    argv:
      - rmdir
      - "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d"
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_filename | default('') | trim) != ''
  become: true
  ignore_errors: yes

- name: delete {{ systemd_network_dir }}/20-gnbsim-access.network
  file:
    path: "{{ systemd_network_dir }}/20-gnbsim-access.network"
    state: absent
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: delete  {{ systemd_network_dir }}/10-gnbsim-access.netdev
  file:
    path: "{{ systemd_network_dir }}/10-gnbsim-access.netdev"
    state: absent
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

# TODO: fix this hack (make a proper cleanup service)
- name: remove gnbaccess macvlan interface
  command:
    argv:
      - ip
      - link
      - del
      - gnbaccess
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  failed_when: false

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_filter to 0
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '0'
    sysctl_set: true
    reload: true
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname not in groups['master_nodes'])
  become: true

- name: set net.ipv4.conf.all.arp_ignore to 0
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '0'
    sysctl_set: true
    reload: true
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname not in groups['master_nodes'])
  become: true

- name: set net.ipv4.conf.all.arp_announce to 0
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '0'
    sysctl_set: true
    reload: true
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname not in groups['master_nodes'])
  become: true

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname not in groups['master_nodes'])
  become: true

- name: warn when sysctl backup file is missing and sysctl values cannot be restored
  ansible.builtin.debug:
    msg: >-
      WARNING: the sysctl backup file ({{ router_sysctl_backup_file }}) is
      missing or unreadable. net.ipv4.ip_forward and per-interface forwarding
      settings cannot be restored to their pre-install values. If IP forwarding
      was disabled before gnbsim was installed, manual cleanup may be required.
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_content.content is not defined

- name: extract saved router sysctl values
  set_fact:
    saved_net_ipv4_ip_forward: >-
      {{
        (router_sysctl_backup_content.content | default('') | b64decode)
        | regex_findall('(?m)^net\\.ipv4\\.ip_forward=(.+)$')
        | first
        | default('', true)
      }}
    saved_net_ipv4_conf_iface_forwarding: >-
      {{
        (router_sysctl_backup_content.content | default('') | b64decode)
        | regex_findall(router_data_iface_forwarding_backup_regexp, multiline=true)
        | first
        | default(['', ''], true)
        | last
      }}
  when: inventory_hostname in groups['gnbsim_nodes']
  ignore_errors: yes

- name: restore {{ router_data_iface_forwarding_sysctl }}
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    value: '{{ saved_net_ipv4_conf_iface_forwarding }}'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (saved_net_ipv4_conf_iface_forwarding | default('')) != ''
  become: true
  ignore_errors: yes

- name: reset {{ router_data_iface_forwarding_sysctl }} to 0 (no saved value)
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    value: '0'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_content.content is defined
    - (gnbsim.router.data_iface | default('') | trim) != ''
    - (saved_net_ipv4_conf_iface_forwarding | default('')) == ''
  become: true
  ignore_errors: yes

- name: remove {{ router_data_iface_forwarding_sysctl }} sysctl configuration
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    state: absent
    sysctl_set: false
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_content.content is defined
    - (gnbsim.router.data_iface | default('') | trim) != ''
    - (saved_net_ipv4_conf_iface_forwarding | default('')) == ''
  become: true
  ignore_errors: yes

- name: restore net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '{{ saved_net_ipv4_ip_forward }}'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (saved_net_ipv4_ip_forward | default('')) != ''
  become: true
  ignore_errors: yes

- name: reset net.ipv4.ip_forward to 0 (no saved value)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '0'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_content.content is defined
    - (saved_net_ipv4_ip_forward | default('')) == ''
  become: true
  ignore_errors: yes

- name: remove net.ipv4.ip_forward sysctl configuration
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    state: absent
    sysctl_set: false
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_content.content is defined
    - (saved_net_ipv4_ip_forward | default('')) == ''
  become: true
  ignore_errors: yes

- name: delete router sysctl backup file
  file:
    path: "{{ router_sysctl_backup_file }}"
    state: absent
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_content.content is defined
  become: true
  ignore_errors: yes

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: restart systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
  become: true
