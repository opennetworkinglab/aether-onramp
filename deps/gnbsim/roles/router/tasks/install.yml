---

- set_fact:
    systemd_network_dir: /etc/systemd/network
    systemd_system_dir: /etc/systemd/system

- name: set net.ipv4.conf.all.arp_filter to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_ignore to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_announce to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.ip_forward to 1
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.{{ gnbsim.router.data_iface }}.forwarding to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.{{ gnbsim.router.data_iface }}.forwarding
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: copy 10-gnbsim-access.netdev to {{ systemd_network_dir }}/10-gnbsim-access.netdev
  template:
    src: roles/router/templates/10-gnbsim-access.netdev
    dest: "{{ systemd_network_dir }}/10-gnbsim-access.netdev"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: copy 20-gnbsim-access.network to {{ systemd_network_dir }}/20-gnbsim-access.network
  template:
    src: roles/router/templates/20-gnbsim-access.network
    dest: "{{ systemd_network_dir }}/20-gnbsim-access.network"
  vars:
    subnet_address: "{{ gnbsim.router.macvlan.subnet_prefix }}.{{ lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname) }}.1/24"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: check if systemd-networkd is active
  shell: systemctl is-active systemd-networkd 2>/dev/null || true
  register: systemd_networkd_state
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set whether systemd-networkd is active
  set_fact:
    systemd_networkd_active: "{{ (systemd_networkd_state.stdout | default('') | trim) == 'active' }}"
  when: inventory_hostname in groups['gnbsim_nodes']

- name: find {{ gnbsim.router.data_iface }}'s active systemd-networkd file via networkctl
  shell: |
    networkctl status {{ gnbsim.router.data_iface }} 2>/dev/null \
      | awk -F': ' '/Network File:/ && $2 ~ /\.network$/ {print $2; exit}' \
      | xargs -r basename
  register: data_iface_network_file_networkctl
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
  become: true

- name: find {{ gnbsim.router.data_iface }}'s systemd-networkd file by filename
  shell: |
    find /etc/systemd/network /run/systemd/network /lib/systemd/network /usr/lib/systemd/network \
      -maxdepth 1 -type f -name '*{{ gnbsim.router.data_iface }}.network' -print 2>/dev/null \
      | sort \
      | head -n 1 \
      | xargs -r basename
  register: data_iface_network_file_cmd
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
    - (data_iface_network_file_networkctl.stdout | default('') | trim) == ''
  become: true

- name: set {{ gnbsim.router.data_iface }}'s systemd-networkd filename
  set_fact:
    data_iface_network_filename: >-
      {{
        (data_iface_network_file_networkctl.stdout | default('') | trim)
        if (data_iface_network_file_networkctl.stdout | default('') | trim) != ''
        else (data_iface_network_file_cmd.stdout | default('') | trim)
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active

- name: set empty systemd-networkd filename when systemd-networkd is inactive
  set_fact:
    data_iface_network_filename: ''
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not (systemd_networkd_active | default(false))

- name: set whether {{ gnbsim.router.data_iface }} is managed by systemd-networkd
  set_fact:
    data_iface_networkd_managed: >-
      {{
        systemd_networkd_active
        and (data_iface_network_filename | default('') | trim) is match('.*\\.network$')
      }}
  when: inventory_hostname in groups['gnbsim_nodes']

- name: note direct macvlan fallback for {{ gnbsim.router.data_iface }}
  debug:
    msg: >-
      {{ gnbsim.router.data_iface }} is not managed by systemd-networkd. Falling back to direct macvlan interface setup.
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not data_iface_networkd_managed

- name: create {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d
  file:
    path: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d"
    state: directory
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy macvlan.conf to {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan-gnbsim.conf
  template:
    src: roles/router/templates/macvlan.conf
    dest: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan-gnbsim.conf"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy gnbsim-macvlan.service to {{ systemd_system_dir }}/gnbsim-macvlan.service
  template:
    src: roles/router/templates/gnbsim-macvlan.service
    dest: "{{ systemd_system_dir }}/gnbsim-macvlan.service"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: disable gnbsim-macvlan.service when systemd-networkd manages {{ gnbsim.router.data_iface }}
  systemd:
    name: gnbsim-macvlan.service
    enabled: false
    state: stopped
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: enable gnbsim-macvlan.service for direct macvlan fallback
  systemd:
    name: gnbsim-macvlan.service
    enabled: true
    state: restarted
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not data_iface_networkd_managed
  become: true

- name: restart systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- set_fact:
    subnet: "{{ core.upf.access_subnet | regex_replace('[0-9]+/24', '0/24') }}"
  when: inventory_hostname in groups['gnbsim_nodes']

- name: configure static route for upf traffic on gnbsim node
  shell: |
    ip route replace {{ subnet }} via {{ core.amf.ip }}
  when: (inventory_hostname in groups['gnbsim_nodes']) and (inventory_hostname not in groups['master_nodes'])
  become: true

- name: configure static route for gnbsim traffic on aether node
  shell: |
    ip route replace {{ gnbsim.router.macvlan.subnet_prefix }}.{{ lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', item) }}.0/24 via {{  hostvars[item]['ansible_default_ipv4']['address'] }}
  with_items: "{{ play_hosts | intersect(groups['gnbsim_nodes']) | difference(groups['master_nodes']) }}"
  when: (inventory_hostname in groups['master_nodes'])
  become: true

- name: install iptables-persistent package
  apt:
    name: iptables-persistent
    state: present
    update_cache: yes
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: create /etc/iptables directory
  file:
    path: /etc/iptables
    state: directory
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: deploy gnbsim iptables rules configuration
  template:
    src: roles/router/templates/gnbsim-iptables-rules.v4
    dest: /etc/iptables/gnbsim-rules.v4
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: copy gnbsim-iptables.service to {{ systemd_system_dir }}/gnbsim-iptables.service
  template:
    src: roles/router/templates/gnbsim-iptables.service
    dest: "{{ systemd_system_dir }}/gnbsim-iptables.service"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: enable gnbsim-iptables.service
  systemd:
    name: gnbsim-iptables.service
    enabled: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: start gnbsim-iptables.service
  systemd:
    name: gnbsim-iptables.service
    state: started
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
