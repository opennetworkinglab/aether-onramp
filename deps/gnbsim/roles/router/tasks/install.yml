---

# Resolve `gnbsim.router.data_iface` from the default-route interface
# when it is unset or empty. Explicit operator values are preserved as-is.
- name: derive gnbsim.router.data_iface from default-route interface when unset
  ansible.builtin.set_fact:
    gnbsim: "{{ gnbsim | combine({'router': {'data_iface': ansible_default_ipv4.interface}}, recursive=true) }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - gnbsim.router.data_iface is not defined or gnbsim.router.data_iface == ''

- name: validate gnbsim.router.data_iface is set and exists on this host
  ansible.builtin.fail:
    msg: >-
      gnbsim.router.data_iface (={{ gnbsim.router.data_iface | default('<unset>') | to_json }}) is
      not a valid network interface on this host. Either it was left
      at a placeholder and no IPv4 default route was available to
      derive from, or the configured value does not match any
      interface in ansible_interfaces ({{ (ansible_interfaces | default([])) | join(', ') }}).
      Set gnbsim.router.data_iface explicitly in your inventory vars
      (e.g. group_vars/ or host_vars/) to the
      data-plane interface name on the target node.
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (gnbsim.router.data_iface is not defined)
      or (gnbsim.router.data_iface == '')
      or (gnbsim.router.data_iface not in (ansible_interfaces | default([])))

- set_fact:
    systemd_network_dir: /etc/systemd/network
    systemd_system_dir: /etc/systemd/system
    gnbsim_router_state_dir: /var/lib/gnbsim-router
    gnbsim_default_uplink_forwarding_state_file: /var/lib/gnbsim-router/default-uplink-forwarding
    router_sysctl_backup_file: /var/lib/gnbsim-router-sysctl-backup.conf
    router_data_iface_forwarding_sysctl: "net.ipv4.conf.{{ gnbsim.router.data_iface }}.forwarding"
    router_data_iface_forwarding_backup_regexp: >-
      ^(net\.ipv4\.conf\.{{ gnbsim.router.data_iface | regex_escape }}\.forwarding|net/ipv4/conf/{{ gnbsim.router.data_iface | regex_escape }}/forwarding)=

- name: set net.ipv4.conf.all.arp_filter to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_filter
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_ignore to 1
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_ignore
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.arp_announce to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.arp_announce
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set net.ipv4.conf.all.rp_filter to 2
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '2'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: check for router sysctl backup file
  stat:
    path: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_stat
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: read router sysctl backup file
  slurp:
    src: "{{ router_sysctl_backup_file }}"
  register: router_sysctl_backup_content
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - router_sysctl_backup_stat is defined
    - router_sysctl_backup_stat.stat.exists | default(false)
  become: true

- name: read current net.ipv4.ip_forward value
  command: sysctl -n net.ipv4.ip_forward
  register: original_net_ipv4_ip_forward
  changed_when: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: persist original net.ipv4.ip_forward value for uninstall
  lineinfile:
    path: "{{ router_sysctl_backup_file }}"
    create: true
    mode: '0600'
    line: "net.ipv4.ip_forward={{ original_net_ipv4_ip_forward.stdout | trim }}"
    regexp: '^net\.ipv4\.ip_forward='
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - original_net_ipv4_ip_forward is defined
    - router_sysctl_backup_content is not defined or not ((router_sysctl_backup_content.content | default('') | b64decode) is regex('(?m)^net\\.ipv4\\.ip_forward='))
  become: true

- name: set net.ipv4.ip_forward to 1
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: read current {{ router_data_iface_forwarding_sysctl }} value
  command:
    argv:
      - sysctl
      - -n
      - "{{ router_data_iface_forwarding_sysctl }}"
  register: original_net_ipv4_conf_iface_forwarding
  changed_when: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: persist original {{ router_data_iface_forwarding_sysctl }} value for uninstall
  lineinfile:
    path: "{{ router_sysctl_backup_file }}"
    create: true
    mode: '0600'
    line: "{{ router_data_iface_forwarding_sysctl }}={{ original_net_ipv4_conf_iface_forwarding.stdout | trim }}"
    regexp: "{{ router_data_iface_forwarding_backup_regexp }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - original_net_ipv4_conf_iface_forwarding is defined
    - router_sysctl_backup_content is not defined or not ((router_sysctl_backup_content.content | default('') | b64decode) is regex(router_data_iface_forwarding_backup_regexp, multiline=true))
  become: true

- name: set net.ipv4.conf.{{ gnbsim.router.data_iface }}.forwarding to 1
  ansible.posix.sysctl:
    name: "{{ router_data_iface_forwarding_sysctl }}"
    value: '1'
    sysctl_set: true
    reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: ensure gnbsim router state directory exists
  file:
    path: "{{ gnbsim_router_state_dir }}"
    state: directory
    mode: '0755'
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - ansible_default_ipv4.interface != gnbsim.router.data_iface
  become: true

- name: check for saved default uplink forwarding state
  stat:
    path: "{{ gnbsim_default_uplink_forwarding_state_file }}"
  register: default_uplink_forwarding_state_file
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - ansible_default_ipv4.interface != gnbsim.router.data_iface
  become: true

- name: read current default uplink forwarding state before changing it
  command:
    argv:
      - cat
      - "/proc/sys/net/ipv4/conf/{{ ansible_default_ipv4.interface }}/forwarding"
  register: default_uplink_forwarding_value
  changed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - ansible_default_ipv4.interface != gnbsim.router.data_iface
    - not (default_uplink_forwarding_state_file.stat.exists | default(false))
  become: true

- name: persist original default uplink forwarding state
  copy:
    dest: "{{ gnbsim_default_uplink_forwarding_state_file }}"
    content: |
      interface: "{{ ansible_default_ipv4.interface }}"
      forwarding: "{{ default_uplink_forwarding_value.stdout | trim }}"
    mode: '0644'
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - ansible_default_ipv4.interface != gnbsim.router.data_iface
    - not (default_uplink_forwarding_state_file.stat.exists | default(false))
  become: true

- name: set net.ipv4.conf.{{ ansible_default_ipv4.interface }}.forwarding to 1 when default uplink differs
  ansible.posix.sysctl:
    name: net.ipv4.conf.{{ ansible_default_ipv4.interface }}.forwarding
    value: '1'
    sysctl_set: true
    reload: true
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - ansible_default_ipv4.interface is defined
    - ansible_default_ipv4.interface != gnbsim.router.data_iface
  become: true

- name: copy 10-gnbsim-access.netdev to {{ systemd_network_dir }}/10-gnbsim-access.netdev
  template:
    src: roles/router/templates/10-gnbsim-access.netdev
    dest: "{{ systemd_network_dir }}/10-gnbsim-access.netdev"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: copy 20-gnbsim-access.network to {{ systemd_network_dir }}/20-gnbsim-access.network
  template:
    src: roles/router/templates/20-gnbsim-access.network
    dest: "{{ systemd_network_dir }}/20-gnbsim-access.network"
  vars:
    subnet_address: "{{ gnbsim.router.macvlan.subnet_prefix }}.{{ lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname) }}.1/24"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: check if systemd-networkd is active
  command:
    argv:
      - systemctl
      - is-active
      - systemd-networkd
  register: systemd_networkd_state
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: set whether systemd-networkd is active
  set_fact:
    systemd_networkd_active: "{{ (systemd_networkd_state.stdout | default('') | trim) == 'active' }}"
  when: inventory_hostname in groups['gnbsim_nodes']

- name: read {{ gnbsim.router.data_iface }} networkctl status
  command:
    argv:
      - networkctl
      - status
      - "{{ gnbsim.router.data_iface }}"
  register: data_iface_networkctl_status
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
  become: true

- name: derive {{ gnbsim.router.data_iface }}'s active systemd-networkd file via networkctl
  set_fact:
    data_iface_network_file_networkctl: >-
      {{
        data_iface_networkctl_status.stdout_lines
        | default([])
        | select('match', '^\s*Network File:\s+.*\.network\s*$')
        | map('regex_replace', '^\s*Network File:\s+(.*\.network)\s*$', '\\1')
        | list
        | first
        | default('')
        | basename
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active

- name: find {{ gnbsim.router.data_iface }}'s systemd-networkd file by filename
  find:
    paths:
      - /etc/systemd/network
      - /run/systemd/network
      - /lib/systemd/network
      - /usr/lib/systemd/network
    patterns: "*{{ gnbsim.router.data_iface }}.network"
    recurse: false
    file_type: file
  register: data_iface_network_file_matches
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
    - (data_iface_network_file_networkctl | default('') | trim) == ''
  become: true

- name: derive {{ gnbsim.router.data_iface }}'s systemd-networkd file by filename
  set_fact:
    data_iface_network_file_cmd: >-
      {{
        data_iface_network_file_matches.files
        | default([])
        | map(attribute='path')
        | map('basename')
        | sort
        | first
        | default('')
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active
    - (data_iface_network_file_networkctl | default('') | trim) == ''

- name: set {{ gnbsim.router.data_iface }}'s systemd-networkd filename
  set_fact:
    data_iface_network_filename: >-
      {{
        (data_iface_network_file_networkctl | default('') | trim)
        if (data_iface_network_file_networkctl | default('') | trim) != ''
        else (data_iface_network_file_cmd | default('') | trim)
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - systemd_networkd_active

- name: set empty systemd-networkd filename when systemd-networkd is inactive
  set_fact:
    data_iface_network_filename: ''
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not (systemd_networkd_active | default(false))

- name: resolve {{ gnbsim.router.data_iface }}'s systemd-networkd file path
  find:
    paths:
      - /etc/systemd/network
      - /run/systemd/network
      - /lib/systemd/network
      - /usr/lib/systemd/network
    patterns: "{{ data_iface_network_filename }}"
    recurse: false
    file_type: file
  register: data_iface_network_path_matches
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_filename | default('') | trim) is match('.*\\.network$')
  become: true

- name: set {{ gnbsim.router.data_iface }}'s systemd-networkd file path
  set_fact:
    data_iface_network_path: >-
      {{
        (
        (data_iface_network_path_matches.files | default([]) | map(attribute='path') | select('match', '^/etc/systemd/network/') | list | first)
        | default((data_iface_network_path_matches.files | default([]) | map(attribute='path') | select('match', '^/run/systemd/network/') | list | first), true)
        | default((data_iface_network_path_matches.files | default([]) | map(attribute='path') | select('match', '^/lib/systemd/network/') | list | first), true)
        | default((data_iface_network_path_matches.files | default([]) | map(attribute='path') | select('match', '^/usr/lib/systemd/network/') | list | first), true)
        )
        | default('')
      }}
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_filename | default('') | trim) is match('.*\\.network$')

- name: read {{ gnbsim.router.data_iface }}'s systemd-networkd file
  slurp:
    src: "{{ data_iface_network_path | trim }}"
  register: data_iface_network_file_content
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (data_iface_network_path | default('') | trim) != ''
  become: true

- name: set whether {{ gnbsim.router.data_iface }} is managed by systemd-networkd
  set_fact:
    data_iface_networkd_managed: >-
      {{
        systemd_networkd_active
        and (data_iface_network_filename | default('') | trim) is match('.*\\.network$')
        and (
          (data_iface_network_filename | default('') | trim) is match('(?:[0-9]+-)?{{ gnbsim.router.data_iface | regex_escape }}\\.network$')
          or (
            (data_iface_network_file_content.content | default('') | b64decode)
            is regex('(?ms)^\\[Match\\][^[]*^Name\\s*=\\s*{{ gnbsim.router.data_iface | regex_escape }}\\s*$')
          )
        )
      }}
  when: inventory_hostname in groups['gnbsim_nodes']

- name: note direct macvlan fallback for {{ gnbsim.router.data_iface }}
  debug:
    msg: >-
      {{ gnbsim.router.data_iface }} is not managed by systemd-networkd. Falling back to direct macvlan interface setup.
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not data_iface_networkd_managed

- name: create {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d
  file:
    path: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d"
    state: directory
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy macvlan.conf to {{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan-gnbsim.conf
  template:
    src: roles/router/templates/macvlan.conf
    dest: "{{ systemd_network_dir }}/{{ data_iface_network_filename }}.d/macvlan-gnbsim.conf"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: copy gnbsim-macvlan.service to {{ systemd_system_dir }}/gnbsim-macvlan.service
  template:
    src: roles/router/templates/gnbsim-macvlan.service
    dest: "{{ systemd_system_dir }}/gnbsim-macvlan.service"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: force systemd to reread configs
  systemd:
    daemon_reload: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: disable gnbsim-macvlan.service when systemd-networkd manages {{ gnbsim.router.data_iface }}
  systemd:
    name: gnbsim-macvlan.service
    enabled: false
    state: stopped
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: enable gnbsim-macvlan.service for direct macvlan fallback
  systemd:
    name: gnbsim-macvlan.service
    enabled: true
    state: restarted
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - not data_iface_networkd_managed
  become: true

- name: restart systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - data_iface_networkd_managed
  become: true

- name: install iptables package
  apt:
    name: iptables
    state: present
    update_cache: "{{ not (airgapped.enabled | default(false) | bool) }}"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  environment: "{{ proxy_env | combine({'DEBIAN_FRONTEND': 'noninteractive'}) }}"

- name: create /etc/iptables directory
  file:
    path: /etc/iptables
    state: directory
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: deploy gnbsim iptables rules configuration
  template:
    src: roles/router/templates/gnbsim-iptables-rules.v4
    dest: /etc/iptables/gnbsim-rules.v4
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: copy gnbsim-iptables.service to {{ systemd_system_dir }}/gnbsim-iptables.service
  template:
    src: roles/router/templates/gnbsim-iptables.service
    dest: "{{ systemd_system_dir }}/gnbsim-iptables.service"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: copy gnbsim-routes.sh to /usr/local/sbin/gnbsim-routes.sh
  template:
    src: roles/router/templates/gnbsim-routes.sh
    dest: /usr/local/sbin/gnbsim-routes.sh
    mode: '0755'
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true

- name: copy gnbsim-routes.service to {{ systemd_system_dir }}/gnbsim-routes.service
  template:
    src: roles/router/templates/gnbsim-routes.service
    dest: "{{ systemd_system_dir }}/gnbsim-routes.service"
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true

- name: force systemd to reread configs after installing persistent gnbsim services
  systemd:
    daemon_reload: true
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true

- name: enable gnbsim-iptables.service
  systemd:
    name: gnbsim-iptables.service
    enabled: true
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: start gnbsim-iptables.service
  systemd:
    name: gnbsim-iptables.service
    state: started
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: enable gnbsim-routes.service
  systemd:
    name: gnbsim-routes.service
    enabled: true
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true

- name: start gnbsim-routes.service
  systemd:
    name: gnbsim-routes.service
    state: started
  when: (inventory_hostname in groups['gnbsim_nodes']) or (inventory_hostname in groups['master_nodes'])
  become: true
