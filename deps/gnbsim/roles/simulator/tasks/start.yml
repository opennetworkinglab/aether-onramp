---

- set_fact:
    network_macvlan_name: "{{ gnbsim.docker.network.macvlan.name }}"

- name: get info on gnbsim containers
  community.docker.docker_container_info:
    name: "{{ gnbsim.docker.container.prefix }}-{{ (item.0|int)+1 }}"
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  register: container_info
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: initialize missing gnbsim container list
  set_fact:
    missing_gnbsim_containers: []
    stopped_gnbsim_containers: []
  when: inventory_hostname in groups['gnbsim_nodes']

- name: collect unavailable gnbsim containers
  set_fact:
    missing_gnbsim_containers: >-
      {{
        missing_gnbsim_containers
        + ([container_name] if item.container is none else [])
      }}
    stopped_gnbsim_containers: >-
      {{
        stopped_gnbsim_containers
        + ([container_name] if item.container is not none and not (item.container.State.Running | default(false)) else [])
      }}
  loop: "{{ container_info.results | default([]) }}"
  loop_control:
    label: "{{ container_name }}"
  vars:
    container_name: "{{ gnbsim.docker.container.prefix }}-{{ (item.item.0 | int) + 1 }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']

- name: ensure gnbsim containers are ready
  ansible.builtin.fail:
    msg: >-
      {% if (missing_gnbsim_containers | default([]) | length) > 0 %}
      Missing container(s): {{ missing_gnbsim_containers | join(', ') }}.
      {% endif %}
      {% if (stopped_gnbsim_containers | default([]) | length) > 0 %}
      Stopped container(s): {{ stopped_gnbsim_containers | join(', ') }}.
      {% endif %}
      Run make gnbsim-install or make gnbsim-container-start before running the simulator.
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - >-
      (missing_gnbsim_containers | default([]) | length) > 0 or
      (stopped_gnbsim_containers | default([]) | length) > 0

- name: Remove config file on host
  ansible.builtin.file:
    path: "/tmp/gnbsim-{{ (item.0|int)+1 }}.yaml"
    state: absent
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  when: inventory_hostname in groups['gnbsim_nodes']

- name: copy config files to gnbsim host
  template:
    src: "{{ ROOT_DIR }}/{{ item.1 }}"
    dest: /tmp/gnbsim-{{ (item.0|int)+1 }}.yaml
  vars:
    ping_target: "{{ core.upf.core_subnet | regex_replace('(/.*$)', '') }}"
    amf_ip: "{{ core.amf.ip }}"
    container_ip: "{{ container_info.results[item.0].container.NetworkSettings.Networks[network_macvlan_name].IPAddress }}"
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  when: inventory_hostname in groups['gnbsim_nodes']

- name: copy config files into gnbsim containers
  command:
    argv:
      - docker
      - cp
      - "/tmp/gnbsim-{{ (item.0|int)+1 }}.yaml"
      - "{{ gnbsim.docker.container.prefix }}-{{ (item.0|int)+1 }}:/tmp/gnbsim.yaml"
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- name: stat Docker log paths for gnbsim containers
  stat:
    path: "{{ container_info.results[item.0].container.LogPath }}"
  register: gnbsim_log_path_stat
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (container_info.results[item.0].container.LogPath | default('')) != ''
  become: true

- name: truncate Docker logs for gnbsim containers
  command:
    argv:
      - truncate
      - -s
      - "0"
      - "{{ container_info.results[item.0].container.LogPath }}"
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  when:
    - inventory_hostname in groups['gnbsim_nodes']
    - (container_info.results[item.0].container.LogPath | default('')) != ''
    - gnbsim_log_path_stat.results[item.0].stat.exists | default(false)
    - gnbsim_log_path_stat.results[item.0].stat.isreg | default(false)
  become: true
  failed_when: false

- name: start gnbsim
  community.docker.docker_container_exec:
    container: "{{ gnbsim.docker.container.prefix }}-{{ (item.0|int)+1 }}"
    command: |
      /bin/bash -o pipefail -c "
      set -e
      rm -rf *.log; rm -f *.config
      gnbsim --cfg /tmp/gnbsim.yaml > /proc/1/fd/1 2> /proc/1/fd/2
      run_suffix={{ (item.0|int)+1 }}-{{ ansible_date_time.iso8601_basic_short }}
      cp -f gnbsim.log ./gnbsim${run_suffix}.log
      cp -f summary.log ./summary${run_suffix}.log
      cp -f /tmp/gnbsim.yaml ./gnbsim${run_suffix}.config
      "
  async: 100
  poll: 0
  with_indexed_items: "{{ gnbsim.servers[lookup('ansible.utils.index_of', groups['gnbsim_nodes'], 'eq', inventory_hostname)] }}"
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true

- pause:
    seconds: 1

- name: loop until gnbsim completes
  command:
    argv:
      - pgrep
      - -fc
      - --
      - --cfg /tmp/gnbsim
  register: async_result
  until: async_result.rc == 1
  retries: 100
  delay: 5
  when: inventory_hostname in groups['gnbsim_nodes']
  failed_when: async_result.rc not in [0, 1]
  changed_when: false

- name: show output of summary.log from gnbsim container
  community.docker.docker_container_exec:
    container: "{{ gnbsim.docker.container.prefix }}-1"
    command: cat summary.log
  register: gNbsimPod
  when: inventory_hostname in groups['gnbsim_nodes']
  become: true
  changed_when: false

- name: Check if simulation failed
  set_fact:
    status_fail: "{{ 'Profile Status: FAIL' in gNbsimPod.stdout or 'Status: FAIL' in gNbsimPod.stdout }}"
    status_empty: "{{ (gNbsimPod.stdout | trim) == '' }}"

- debug:
    msg: "{{ gNbsimPod.stdout_lines | map('regex_replace', '^([^\t]*\t){3}([^\t]*)\t.*$', '\\2') | list if not status_empty else ['summary.log is empty; gnbsim did not emit a summary'] }}"
  when: inventory_hostname in groups['gnbsim_nodes']
  failed_when: status_fail or status_empty
  ignore_errors: yes
