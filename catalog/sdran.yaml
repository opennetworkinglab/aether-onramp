apiVersion: onramp.aetherproject.org/v1
kind: Component
name: sdran
description: SD-RAN intelligent RAN controller
repo_url: https://github.com/opennetworkinglab/aether-onramp
docs_url: https://docs.aetherproject.org/onramp/start.html
status: active
ui_visible: true
group: ran
vars_key: sdran
blueprint_file: main-sdran.yml
install_tier: 2
actions:
  - name: install
    description: Deploy SD-RAN
    target: aether-sdran-install
  - name: uninstall
    description: Remove SD-RAN
    target: aether-sdran-uninstall
dependencies:
  requires: [k8s]
  required_by: []
probe:
  type: helm_release
  namespace: sdran
schema:
  type: object
  properties:
    platform:
      type: object
      description: SD-RAN platform infrastructure settings
      properties:
        atomix:
          type: object
          properties:
            helm:
              type: object
              properties:
                chart_ref:
                  type: string
                  description: Chart registry reference or local chart path
                chart_version:
                  type: string
                  description: Chart version constraint
        onosproject:
          type: object
          properties:
            helm:
              type: object
              properties:
                chart_ref:
                  type: string
                  description: Chart registry reference or local chart path
                chart_version:
                  type: string
                  description: Chart version constraint
        store:
          type: object
          properties:
            lpp:
              type: object
              properties:
                version:
                  type: string
                  description: Local persistent provisioner version
    sdran:
      type: object
      description: SD-RAN application layer settings
      properties:
        helm:
          type: object
          properties:
            local_charts:
              type: boolean
              description: Use local charts instead of fetching from a registry
            chart_ref:
              type: string
              description: Chart registry reference or local chart path
            chart_version:
              type: string
              description: Chart version constraint
        import:
          type: object
          description: Feature flags for xApps and services
          properties:
            e2t:
              type: boolean
            a1t:
              type: boolean
            uenib:
              type: boolean
            topo:
              type: boolean
            config:
              type: boolean
            ransim:
              type: boolean
            kpimon:
              type: boolean
            pci:
              type: boolean
            mho:
              type: boolean
            mlb:
              type: boolean
            ts:
              type: boolean
        ransim:
          type: object
          description: RAN simulator configuration
          properties:
            model:
              type: string
              description: RAN topology model name or file
            metric:
              type: string
              description: Metrics profile name or file
