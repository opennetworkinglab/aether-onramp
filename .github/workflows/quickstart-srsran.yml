# GitHub Actions workflow replicating srsran.groovy functionality

name: Aether OnRamp srsRAN

on:
  workflow_dispatch:
    inputs:
      agent_label:
        description: "Label for selecting runner (if using self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string

jobs:
  quickstart-srsran:
    uses: ./.github/workflows/reusable-quickstart.yml
    with:
      agent_label: ${{ github.event.inputs.agent_label || 'ubuntu-latest' }}
      target_group: srsran_nodes
      vars_template: vars/main-srsran.yml
      configure_commands: |
        MYIPNET=$(ip addr show $MYIFC | grep 'inet ' | awk '{print $2}')
        echo "MY IPNET is: $MYIPNET"
        VARS_MAIN="vars/main.yml"
        sed -i "s|ens18|$MYIFC|g" "$VARS_MAIN"
        sed -i "s|10.76.28.113|$MYIP|" "$VARS_MAIN"
        sed -i 's|172.20.0.0/16|""|' "$VARS_MAIN"
        sed -i "s|10.76.28.115|$MYIP|" "$VARS_MAIN"
        sed -i "s|10.76.28.0/24|$MYIPNET|" "$VARS_MAIN"
        git diff "$VARS_MAIN"
      install_commands: |
        make aether-k8s-install
        make aether-5gc-install
        sleep 10
        make aether-srsran-gnb-install
        sleep 10
      inspect_commands: |
        kubectl get pods -n aether-5gc -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,RESTARTS:.status.containerStatuses[*].restartCount,IMAGE:.spec.containers[*].image
        docker ps
      run_commands: |
        make aether-srsran-uesim-start
      run_continue_on_error: true
      validate_commands: |
        docker exec rfsim5g-srsran-nr-ue ip netns exec ue1 ping -c 5 192.168.250.1 > srs-uesim.log
        grep "0% packet loss" srs-uesim.log
      log_prefix: srsran
      artifact_name: srsran-logs
      extra_log_commands: |
        docker logs srsran-gnb > logs/srsran_gnb.log 2>&1 || echo "Failed to get srsran-gnb logs"
        docker logs rfsim5g-srsran-nr-ue > logs/srsran_ue.log 2>&1 || echo "Failed to get srsran-nr-ue logs"
      cleanup_targets: aether-srsran-uesim-stop aether-srsran-gnb-uninstall aether-5gc-uninstall aether-k8s-uninstall
    secrets: inherit
