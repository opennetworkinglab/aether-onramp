# GitHub Actions workflow replicating quickstart.groovy functionality

name: Aether OnRamp Quickstart

on:
  workflow_dispatch:
    inputs:
      agent_label:
        description: "Label for selecting runner (if using self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quickstart:
    uses: ./.github/workflows/reusable-quickstart.yml
    with:
      agent_label: ${{ github.event.inputs.agent_label || 'ubuntu-latest' }}
      target_group: gnbsim_nodes
      vars_template: vars/main-quickstart.yml
      configure_commands: |
        sed -i "s/10.76.28.113/$MYIP/" vars/main.yml
        sed -i "s/ens18/$MYIFC/g" vars/main.yml
      install_commands: |
        make aether-k8s-install
        make aether-5gc-install
        make aether-gnbsim-install
      inspect_commands: |
        kubectl get pods -n aether-5gc -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,RESTARTS:.status.containerStatuses[*].restartCount,IMAGE:.spec.containers[*].image
        docker ps
      run_commands: |
        make aether-gnbsim-run
        docker exec gnbsim-1 cat summary.log
      validate_commands: |
        docker exec gnbsim-1 cat summary.log | grep "Ue's Passed" | grep -v "Passed: 0"
      log_prefix: quickstart
      artifact_name: quickstart-logs
      extra_log_commands: |
        docker logs gnbsim-1 > logs/gnbsim.log 2>&1 || echo "Failed to get gnbsim container logs"
      cleanup_targets: gnbsim-uninstall 5gc-uninstall k8s-uninstall
    secrets: inherit
