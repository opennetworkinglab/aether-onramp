# GitHub Actions workflow replicating sdran.groovy functionality

name: Aether OnRamp SD-RAN

on:
  workflow_dispatch:
    inputs:
      agent_label:
        description: "Label for selecting runner (if using self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string

jobs:
  quickstart-sdran:
    uses: ./.github/workflows/reusable-quickstart.yml
    with:
      agent_label: ${{ github.event.inputs.agent_label || 'ubuntu-latest' }}
      target_group: gnbsim_nodes
      vars_template: vars/main-sdran.yml
      configure_commands: |
        sed -i "s/10.76.28.113/$MYIP/" vars/main.yml
        sed -i "s/ens18/$MYIFC/g" vars/main.yml
      install_commands: |
        make k8s-install
        make 5gc-install
        make sdran-install
      inspect_commands: |
        kubectl get pods -n aether-5gc -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,RESTARTS:.status.containerStatuses[*].restartCount,IMAGE:.spec.containers[*].image
        kubectl get pods -n sdran -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,RESTARTS:.status.containerStatuses[*].restartCount,IMAGE:.spec.containers[*].image
      validate_commands: |
        echo "Give the simulator a chance to run (ideally, playbook should loop until done)"
        kubectl exec -i deployment/onos-cli -n sdran -- onos kpimon list metrics --no-headers > ransim.log
        kubectl exec -i deployment/onos-cli -n sdran -- onos ransim get ueCount >> ransim.log
        kubectl exec -i deployment/onos-cli -n sdran -- onos ransim get cells --no-headers >> ransim.log
        kubectl exec -i deployment/onos-cli -n sdran -- onos topo get entity e2cell >> ransim.log
        cat ransim.log
      log_prefix: sdran
      artifact_name: sdran-logs
      extra_log_commands: |
        cp ransim.log logs/ 2>/dev/null || echo "No ransim.log found"
        RANSIM_POD_NAME=$(kubectl get pods -n sdran | grep ran-simulator | awk 'NR==1{print $1}' || echo "")
        if [ -n "$RANSIM_POD_NAME" ]; then
          echo "Retrieving RAN Simulator logs from: ${RANSIM_POD_NAME}"
          kubectl logs $RANSIM_POD_NAME -n sdran > logs/sdran_ransim.log
        fi
      cleanup_targets: sdran-uninstall 5gc-uninstall k8s-uninstall
    secrets: inherit
