# GitHub Actions workflow replicating quickstart_amp.groovy functionality

name: Aether OnRamp Quickstart AMP

on:
  workflow_dispatch:
    inputs:
      agent_label:
        description: "Label for selecting runner (if using self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string

jobs:
  quickstart-amp:
    runs-on: ${{ github.event.inputs.agent_label || 'ubuntu-latest' }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Create Python virtual environment
        run: |
          python -m venv $HOME/ubuntu_venv
          echo "$HOME/ubuntu_venv/bin" >> "$GITHUB_PATH"
          $HOME/ubuntu_venv/bin/pip install --upgrade pip
          $HOME/ubuntu_venv/bin/pip install ansible requests

      - name: Configure OnRamp
        run: |
          # Get network information
          MYIP=$(hostname -I | awk '{print $1}')
          echo "MY IP is: $MYIP"
          MYIFC=$(ip route get 8.8.8.8 | awk '/dev/ {print $5; exit}' || echo "eth0")
          echo "MY IFC is: $MYIFC"

          # Create hosts.ini for local execution (no SSH needed on GitHub runner)
          bash .github/scripts/generate-local-hosts.sh gnbsim_nodes

          # Configure vars/main.yml
          cp vars/main-quickstart.yml vars/main.yml
          sed -i "s/10.76.28.113/$MYIP/" vars/main.yml
          sed -i "s/ens18/$MYIFC/g" vars/main.yml
          sed -i "s/standalone: true/standalone: false/" vars/main.yml

          # Verify configuration
          make aether-pingall

      - name: Install Aether
        run: |
          make aether-k8s-install
          make aether-5gc-install
          make aether-amp-install
          make aether-gnbsim-install

      - name: Inspect Installed Components
        run: |
          kubectl get pods -n aether-5gc -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,RESTARTS:.status.containerStatuses[*].restartCount,IMAGE:.spec.containers[*].image
          kubectl get pods -n aether-roc -o custom-columns=NAME:.metadata.name,READY:.status.containerStatuses[*].ready,STATUS:.status.phase,RESTARTS:.status.containerStatuses[*].restartCount,IMAGE:.spec.containers[*].image
          docker ps

      - name: Run gNBsim
        run: |
          sleep 60
          # Retry logic (2 attempts) to match Jenkins retry(2)
          for attempt in 1 2; do
            echo "Attempt $attempt of 2"
            if make aether-gnbsim-run; then
              docker exec gnbsim-1 cat summary.log
              break
            elif [ $attempt -eq 2 ]; then
              echo "Failed after 2 attempts"
              exit 1
            fi
            echo "Retrying..."
            sleep 10
          done

      - name: Validate Results
        continue-on-error: false
        run: |
          # Weaker validation test
          docker exec gnbsim-1 cat summary.log | grep "Ue's Passed" | grep -v "Passed: 0"

      - name: Retrieve Logs
        if: always()
        run: |
          mkdir -p logs

          # Get gNBsim logs
          logfile=$(docker exec gnbsim-1 ls | grep "gnbsim1-.*.log" || echo "")
          if [ -n "$logfile" ]; then
            echo "Retrieving gNBsim log: ${logfile}"
            docker cp gnbsim-1:/gnbsim/${logfile} logs/${logfile}
          fi

          bash .github/scripts/collect-core-logs.sh logs quickstart_amp

      - name: Archive Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quickstart-amp-logs
          path: logs/*.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          bash .github/scripts/run-cleanup-targets.sh gnbsim-uninstall 5gc-uninstall roc-uninstall k8s-uninstall

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Workflow failed: ${{ github.repository }} - ${{ github.run_number }} - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add Slack notification here if needed using secrets.SLACK_WEBHOOK_URL
