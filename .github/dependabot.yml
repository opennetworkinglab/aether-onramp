version: 2
updates:

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "21:00"
      timezone: "America/Los_Angeles"
    groups:
      actions-deps:
        patterns:
          - "*"
