---
# Computed variables derived from user configuration.
# Ansible loads group_vars/all.yml automatically for every host.

proxy_env: >-
  {{
    {
      'http_proxy':  proxy.http_proxy,
      'https_proxy': proxy.https_proxy,
      'HTTP_PROXY':  proxy.http_proxy,
      'HTTPS_PROXY': proxy.https_proxy,
      'no_proxy':    proxy.no_proxy,
      'NO_PROXY':    proxy.no_proxy
    }
    if (proxy is defined and proxy.enabled | default(false))
    else {}
  }}
